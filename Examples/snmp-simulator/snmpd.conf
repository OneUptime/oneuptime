agentAddress udp:0.0.0.0:161

# SNMP v1/v2c
rocommunity public default

# SNMPv3: user "oneuptime", auth SHA / priv AES (matches OneUptime's
# SnmpAuthProtocol.SHA and SnmpPrivProtocol.AES options), level authPriv.
createUser oneuptime SHA authpass123 AES privpass123
rouser oneuptime priv

sysName router-v3
sysLocation Simulator lab, rack 3
sysContact noc@example.com
sysServices 72
