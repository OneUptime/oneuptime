load_module modules/ngx_http_js_module.so;

user  nginx;
worker_processes  auto;
# The ingress fans a very high volume of short-lived upstream connections
# (OTLP/telemetry ingest, API, dashboard) out to the backend. Raise the
# file-descriptor ceiling so worker_connections below is bounded by kernel
# source ports (see the sysctl tuning in the Helm chart / docker-compose),
# not by nginx's own defaults.
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;


events {
    worker_connections  16384;
}


http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    # Connection header for upstream requests. WebSocket/Upgrade requests must
    # forward "Connection: upgrade"; every other request gets an empty value so
    # nginx can return the upstream connection to the keepalive pool for reuse
    # (see the upstream{} keepalive blocks generated into conf.d/default.conf).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    #gzip  on;

    include /etc/nginx/conf.d/default.conf;
}
