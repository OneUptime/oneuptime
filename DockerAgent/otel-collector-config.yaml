receivers:
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 30s
    provide_per_core_cpu_metrics: true
    # Collects: container.cpu.*, container.memory.*, container.network.io.*,
    #           container.blockio.*, container.uptime, container.restarts,
    #           container.pids.count

  file_log:
    include:
      - /var/lib/docker/containers/*/*.log
    operators:
      - type: json_parser
        # Docker JSON log format: {"log":"...","stream":"stdout","time":"..."}
      - type: move
        from: attributes.log
        to: body
      - type: move
        from: attributes.stream
        to: attributes["log.iostream"]

processors:
  resource:
    attributes:
      - key: container.runtime
        value: "docker"
        action: upsert
      - key: host.name
        value: "${env:DOCKER_HOST_NAME}"
        action: upsert
  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: [os]
    override: false
  batch:
    timeout: 10s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128

exporters:
  otlp_http:
    endpoint: "${env:ONEUPTIME_URL}/otlp"
    headers:
      x-oneuptime-service-token: "${env:ONEUPTIME_SERVICE_TOKEN}"

service:
  pipelines:
    metrics:
      receivers: [docker_stats]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [otlp_http]
    logs:
      receivers: [file_log]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [otlp_http]
