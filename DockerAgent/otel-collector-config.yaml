receivers:
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 30s
    provide_per_core_cpu_metrics: true
    # Collects: container.cpu.*, container.memory.*, container.network.io.*,
    #           container.blockio.*, container.uptime, container.restarts,
    #           container.pids.count

  filelog:
    include:
      - /var/lib/docker/containers/*/*-json.log
    start_at: end
    include_file_path: true
    include_file_name: false
    operators:
      # Parse the Docker JSON log envelope
      - type: json_parser
        id: parser-docker
        timestamp:
          parse_from: attributes.time
          layout: "%Y-%m-%dT%H:%M:%S.%LZ"
      # Extract the container ID from the file path so we can display
      # it on the Logs page and correlate with docker_stats metrics.
      - type: regex_parser
        id: extract-container-id
        regex: "^/var/lib/docker/containers/(?P<container_id>[^/]+)/.+$"
        parse_from: attributes["log.file.path"]
      - type: move
        from: attributes.container_id
        to: resource["container.id"]
      - type: move
        from: attributes.log
        to: body
      - type: move
        from: attributes.stream
        to: attributes["log.iostream"]

processors:
  resource:
    attributes:
      - key: container.runtime
        value: "docker"
        action: upsert
      - key: host.name
        value: "${env:DOCKER_HOST_NAME}"
        action: upsert
  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: [os]
    override: false
  batch:
    timeout: 10s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128
  # Drop noisy collector self-logs that slip through the filelog exclude
  # (e.g. if DOCKER_AGENT_CONTAINER_ID is not set). Matches on the
  # OTel Collector's characteristic error strings.
  filter/drop_self_logs:
    error_mode: ignore
    logs:
      log_record:
        - 'IsMatch(body, ".*(otelcol|Exporting failed|exporterhelper).*")'

exporters:
  otlp_http:
    endpoint: "${env:ONEUPTIME_URL}/otlp"
    headers:
      x-oneuptime-service-token: "${env:ONEUPTIME_SERVICE_TOKEN}"

service:
  pipelines:
    metrics:
      receivers: [docker_stats]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [otlp_http]
    logs:
      receivers: [filelog]
      processors:
        [memory_limiter, filter/drop_self_logs, resourcedetection, resource, batch]
      exporters: [otlp_http]
