services:
  oneuptime-proxmox-agent:
    # For the optional journald logs pipeline (PVE service logs — see the
    # commented receiver in otel-collector-config.yaml) this stock image
    # is not enough: it is built FROM scratch with no `journalctl` and
    # runs as a non-root user that cannot read the journal. Replace it
    # with the one-line custom image from README.md ("Shipping Proxmox
    # service logs") when you enable that pipeline.
    image: otel/opentelemetry-collector-contrib:latest
    container_name: oneuptime-proxmox-agent
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
      # Uncomment (together with the journald receiver and logs pipeline
      # in otel-collector-config.yaml) to give the collector read access
      # to the systemd journal. Only meaningful when this compose file
      # runs directly on a Proxmox VE node — the journal is per-host.
      # - /var/log/journal:/var/log/journal:ro
      # - /etc/machine-id:/etc/machine-id:ro
    environment:
      - ONEUPTIME_URL=${ONEUPTIME_URL}
      - ONEUPTIME_TELEMETRY_INGESTION_KEY=${ONEUPTIME_TELEMETRY_INGESTION_KEY}
      - PROXMOX_CLUSTER_NAME=${PROXMOX_CLUSTER_NAME:-proxmox-cluster}
      # Address (host:port, no scheme) of prometheus-pve-exporter. The
      # default points at the bundled exporter service below.
      - PVE_EXPORTER_URL=${PVE_EXPORTER_URL:-pve-exporter:9221}
      # Proxmox VE API host (any node of the cluster) that the exporter
      # should query. "localhost" only works when the exporter runs
      # directly on a PVE node — set this when using the bundled exporter.
      - PVE_HOST=${PVE_HOST:-localhost}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: bundled prometheus-pve-exporter. Enable it with
  #   docker compose --profile pve-exporter up -d
  # if you do not already run pve-exporter somewhere. It needs a Proxmox
  # VE API token (Datacenter -> Permissions -> API Tokens) with the
  # PVEAuditor role.
  pve-exporter:
    image: prompve/prometheus-pve-exporter:latest
    container_name: oneuptime-pve-exporter
    profiles: ["pve-exporter"]
    init: true
    # prometheus-pve-exporter wants the API token split into a user part
    # (PVE_USER) and a token-name part (PVE_TOKEN_NAME). PVE_API_TOKEN_ID
    # is the full id exactly as shown in the Proxmox UI
    # ("user@realm!tokenname") — split it here so the .env file can hold
    # the token as copied. ($$ shields the parameter expansion from
    # docker compose interpolation; the exporter ignores unknown PVE_*
    # variables, so leaving PVE_API_TOKEN_ID set is harmless.)
    entrypoint: ["/bin/sh", "-c"]
    command:
      - export PVE_USER="$${PVE_API_TOKEN_ID%%!*}" PVE_TOKEN_NAME="$${PVE_API_TOKEN_ID##*!}" && exec /usr/bin/pve_exporter
    environment:
      - PVE_API_TOKEN_ID=${PVE_API_TOKEN_ID}
      - PVE_TOKEN_VALUE=${PVE_API_TOKEN_SECRET}
      # Proxmox VE ships a self-signed certificate by default, so SSL
      # verification is off unless you opt in.
      - PVE_VERIFY_SSL=${PVE_VERIFY_SSL:-false}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
