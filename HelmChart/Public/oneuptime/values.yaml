# See documentation: https://oneuptime.com/docs/self-hosted/sendgrid-inbound-email
inboundEmail:
  # Email provider type (currently only SendGrid is supported)
  provider: SendGrid
  # The domain configured for inbound email (e.g., inbound.yourdomain.com)
  # Required for the Incoming Email Monitor feature to work
  domain:
  # Optional webhook secret for validating incoming webhooks from the email provider
  webhookSecret:

# BullMQ Queue Dashboard (Bull Board)
# When enabled, exposes the queue inspector UI at /worker/inspect/queue/<secret>.
# Both `enabled` and a non-empty `secret` are required to mount the dashboard.
queueDashboard:
  enabled: false
  secret:

keda:
  enabled: true

# CloudNativePG operator — bundled dependency. Installed ONLY when
# postgresOperator.cnpg.enabled is true (see the condition in Chart.yaml).
# Full operator values: https://github.com/cloudnative-pg/charts/tree/main/charts/cloudnative-pg
cloudnative-pg:
  # Install the CloudNativePG CRDs together with the operator.
  crds:
    create: true
  # Operator controller replicas.
  replicaCount: 1

# Altinity ClickHouse operator — bundled dependency. Installed ONLY when
# clickhouseOperator.altinity.enabled is true (see the condition in Chart.yaml).
# The operator is cluster-scoped and installs its CRDs via pre-install/pre-upgrade
# Helm hooks. Full operator values: https://github.com/Altinity/clickhouse-operator/tree/master/deploy/helm/clickhouse-operator
altinity-clickhouse-operator:
  # The operator manages ClickHouse using its own "clickhouse_operator" user. Override
  # these for production (the password is otherwise a well-known default).
  secret:
    create: true
    username: clickhouse_operator
    password: clickhouse_operator_password
