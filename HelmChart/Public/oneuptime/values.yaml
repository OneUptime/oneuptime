  host:
  port:
  username:
  password:
  # If you're using an existing secret for the password, please use this instead of password.
  existingSecret:
    name:
    # This is the key in the secret where the password is stored.
    passwordKey:
  database:
  ssl:
    enabled: false
    # If this is enabled, please set either "ca"
    ca:
    # (optional)
    cert:
    key:

## External Redis Configuration
# You need to set redis.enabled to false if you're using an external redis database.

externalRedis:
  host:
  port:
  username:
  password:
  ipFamily:
  # If you're using an existing secret for the password, please use this instead of password.
  existingSecret:
    name:
    # This is the key in the secret where the password is stored.
    passwordKey:
  database:
  tls:
    enabled: false
    # If this is enabled, please set "ca" certificate.
    ca:
    # (optional)
    cert:
    key:

## External Clickhouse Configuration
# You need to set clickhouse.enabled to false if you're using an external clickhouse database.
externalClickhouse:
  host:
  ## If the host is https, set this to true. Otherwise, set it to false.
  isHostHttps: false
  port:
  username:
  password:
  # If you're using an existing secret for the password, please use this instead of password.
  existingSecret:
    name:
    # This is the key in the secret where the password is stored.
    passwordKey:
  database:
  tls:
    enabled: false
    # If this is enabled, please set either "ca"
    ca:
    # (optional)
    cert:
    key:

openSourceDeployment:
  # This webhook is called when a new self-hosted open source deployment registers.
  webhookUrl:

# Notification webhooks when certain events happen in the system. (usually they are slack webhooks)
notifications:
  webhooks:
    slack:
      # This is the webhook that will be called when a user is created or signs up.
      onCreateUser:
      onDeleteProject:
      onCreateProject:
      onSubscriptionUpdate:

startupProbe: # Startup probe configuration
  enabled: true
  periodSeconds: 60
  failureThreshold: 18

livenessProbe: # Liveness probe configuration
  enabled: true
  periodSeconds: 60
  timeoutSeconds: 120
  initialDelaySeconds: 10

readinessProbe: # Readiness probe configuration
  enabled: true
  periodSeconds: 60
  initialDelaySeconds: 10
  timeoutSeconds: 120

home:
  enabled: false
  replicaCount: 1
  disableTelemetryCollection: false
  enableProfiling: false
  disableAutoscaler: false
  ports:
    http: 1444
  resources:
  nodeSelector: {}
  podSecurityContext: {}
  hostAliases: []
  containerSecurityContext: {}


app:
  enabled: true
  replicaCount: 1
  workerConcurrency: 100
  # Max concurrent telemetry ingestion jobs processed by each pod
  telemetryConcurrency: 100
  disableTelemetryCollection: false
  enableProfiling: false
  disableAutoscaler: false
  ports:
    http: 3002
    grpc: 4317
  resources:
  nodeSelector: {}
  podSecurityContext: {}
  hostAliases: []
  containerSecurityContext: {}
  # KEDA autoscaling configuration based on combined queue metrics (worker + workflow + telemetry)
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    # Scale up when combined queue size (worker + workflow + telemetry) exceeds this threshold
    queueSizeThreshold: 10
    # Scale up when average CPU utilization exceeds this percentage (0 to disable).
    # If enabled, app.resources.requests.cpu must also be set.
    targetCPUUtilizationPercentage: 0
    # Scale up when average memory utilization exceeds this percentage (0 to disable).
    # If enabled, app.resources.requests.memory must also be set.
    targetMemoryUtilizationPercentage: 0
    # Polling interval for metrics (in seconds)
    pollingInterval: 30
    # Cooldown period after scaling (in seconds)
    cooldownPeriod: 300
    # Fallback used when KEDA cannot read the metrics-api endpoint
    # (e.g. all app pods are down). Prevents HPA from flapping between
    # min/max when the queue-size metric goes <unknown>, which would otherwise
    # cause a cascading outage. Set replicas to 0 to disable.
    # Note: only applies to the metrics-api trigger, not cpu/memory.
    fallback:
      failureThreshold: 3
      replicas: 2

# Dedicated worker deployment (opt-in). When enabled, the `app` pods set
# DISABLE_QUEUE_WORKERS=true and stop consuming BullMQ queues, and this
# deployment drains them instead — so heavy telemetry/background processing
# never stalls API requests on the shared event loop. It runs the same image
# as `app` (no external ingress, no gRPC), scaled on combined queue depth
# (worker + workflow + telemetry) via KEDA.
# NOTE: with the split enabled the worker is REQUIRED for ALL background work
# (notifications, incident/alert state, telemetry ingestion) — keep
# keda.minReplicas >= 1. Also set app.keda.targetCPUUtilizationPercentage (and
# app.resources.requests.cpu) so the api tier still autoscales, since its
# queue-size trigger is disabled in split mode.
worker:
  enabled: false
  replicaCount: 1
  workerConcurrency: 100
  # Max concurrent telemetry ingestion jobs processed by each worker pod.
  # This is the telemetry hot path; tune it together with pod CPU/memory.
  telemetryConcurrency: 100
  disableTelemetryCollection: false
  enableProfiling: false
  disableAutoscaler: false
  ports:
    http: 3002
  resources:
  nodeSelector: {}
  podSecurityContext: {}
  hostAliases: []
  containerSecurityContext: {}
  # KEDA autoscaling based on combined queue depth (worker + workflow + telemetry)
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    # Scale up when combined queue size (worker + workflow + telemetry) exceeds this threshold
    queueSizeThreshold: 10
    # Scale up when average CPU utilization exceeds this percentage (0 to disable).
    # If enabled, worker.resources.requests.cpu must also be set.
    targetCPUUtilizationPercentage: 0
    # Scale up when average memory utilization exceeds this percentage (0 to disable).
    # If enabled, worker.resources.requests.memory must also be set.
    targetMemoryUtilizationPercentage: 0
    # Polling interval for metrics (in seconds)
    pollingInterval: 30
    # Cooldown period after scaling (in seconds)
    cooldownPeriod: 300
    # Fallback used when KEDA cannot read the metrics-api endpoint
    # (e.g. all worker pods are down). Prevents HPA from flapping between
    # min/max when the queue-size metric goes <unknown>. Set replicas to 0 to disable.
    # Note: only applies to the metrics-api trigger, not cpu/memory.
    fallback:
      failureThreshold: 3
      replicas: 2

# AI Agent Configuration
# Deploy this to run an AI Agent within your Kubernetes cluster
# Note: This is disabled by default. To enable, set enabled to true and provide the AI Agent credentials
aiAgent:
  enabled: false
  replicaCount: 1
  disableTelemetryCollection: false
  enableProfiling: false
  disableAutoscaler: false
  # AI Agent ID from OneUptime dashboard (required when enabled)
  id:
  # AI Agent Key from OneUptime dashboard (will be stored in secrets if not provided)
  key:
  ports:
    http: 3875
  resources:
  nodeSelector: {}
  podSecurityContext: {}
  hostAliases: []
  containerSecurityContext: {}
  # KEDA autoscaling configuration based on queue metrics
  keda:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    # Scale up when queue size exceeds this threshold
    queueSizeThreshold: 5
    # Polling interval for metrics (in seconds)
    pollingInterval: 30
    # Cooldown period after scaling (in seconds)
    cooldownPeriod: 300
    # Fallback used when KEDA cannot read the metrics-api endpoint
    # (e.g. all pods are down). Prevents HPA from flapping between
    # min/max when the metric goes <unknown>. Set replicas to 0 to disable.
    # Note: only applies to the metrics-api trigger, not cpu/memory.
    fallback:
      failureThreshold: 3
      replicas: 1

