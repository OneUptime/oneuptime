probes:
  one:
    name: "Probe"
    description: "Probe"
    enabled: true
    monitoringWorkers: 3
    monitorFetchLimit: 10
    monitorRetryLimit: 3
    key:
    replicaCount: 1
    syntheticMonitorScriptTimeoutInMs: 60000
    customCodeMonitorScriptTimeoutInMs: 60000
    disableTelemetryCollection: false
    enableProfiling: false
    disableAutoscaler: false
    # Per-service autoscaling (HorizontalPodAutoscaler) override. Any key omitted
    # here inherits the global `autoscaling:` block. Only takes effect when the
    # HPA is active (enabled here or globally, and disableAutoscaler is false).
    # autoscaling:
    #   enabled: true
    #   minReplicas: 2
    #   maxReplicas: 10
    #   targetCPUUtilizationPercentage: 80
    #   targetMemoryUtilizationPercentage: 80
    ports:
      http: 3874
    # Proxy configuration for probe connections
    proxy:
      # HTTP proxy URL for HTTP requests (optional)
      # Format: http://[username:password@]proxy.server.com:port
      # Example: http://proxy.example.com:8080
      # Example with auth: http://username:password@proxy.example.com:8080
      httpProxyUrl:
      # HTTPS proxy URL for HTTPS requests (optional)
      # Format: http://[username:password@]proxy.server.com:port
      # Example: http://proxy.example.com:8080
      # Example with auth: http://username:password@proxy.example.com:8080
      httpsProxyUrl:
      # Comma-separated list of hosts that should bypass the proxy (optional)
      # Example: localhost,.internal.example.com,10.0.0.0/8
      noProxy:
    # KEDA autoscaling configuration based on monitor queue metrics
    keda:
      enabled: false
      minReplicas: 1
      maxReplicas: 100
      # Scale up when queue size exceeds this threshold per probe
      queueSizeThreshold: 10
      # Polling interval for metrics (in seconds)
      pollingInterval: 30
      # Cooldown period after scaling (in seconds)
      cooldownPeriod: 300
      # Fallback used when KEDA cannot read the metrics-api endpoint
      # (e.g. all pods are down). Prevents HPA from flapping between
      # min/max when the metric goes <unknown>. Set replicas to 0 to disable.
      # Note: only applies to the metrics-api trigger, not cpu/memory.
      fallback:
        failureThreshold: 3
        replicas: 1
    resources: {}
    nodeSelector: {}
    podSecurityContext: {}
    hostAliases: []
    containerSecurityContext: {}
