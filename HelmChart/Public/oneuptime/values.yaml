## Important: For developers and agents
## If you change the structure of this, please also update the values.schema.json file accordingly for better validation and autocompletion in IDEs.

global:
  storageClass:
  clusterDomain: &global-cluster-domain cluster.local

# Please change this to the domain name / IP where OneUptime server is hosted on.
host: localhost
httpProtocol: http
ssl:
  # Automatically provision a Let's Encrypt certificate for the primary host when set to true.
  # If you enable this, please make sure that the host is publicly accessible via port 80 and 443.
  provision: false
  # Skip TLS certificate verification for outbound HTTPS requests (self-signed certs / internal endpoints).
  # Not safe for production — risk of MITM attacks.
  skipVerification: false

image:
  registry: docker.io
  repository: oneuptime
  pullPolicy: Always
  tag: release

  ## Type of OneUptime image to use.
  ## Possible values: community-edition, enterprise-edition
  ## Enterprise edition images are hardened for more security and compliance, but you need a valid license to use them.
  ## Please contact sales@oneuptime.com for more information.
  type: community-edition
  
  restartPolicy: Always
# imagePullSecrets:
#   - name: MyCustomSecretNameWithDockerCredentials

# Important: You do need to set this to a long random values if you're using OneUptime in production.
# Please set this to string.
oneuptimeSecret:
registerProbeKey:
encryptionSecret:

# Comma-separated list of egress IP addresses that probes use for monitoring checks.
# Customers can use this to whitelist probe traffic in their firewalls.
# This is returned as a JSON array via the /ip-whitelist API endpoint.
# Example: "203.0.113.1,203.0.113.2,198.51.100.10"
ipWhitelist:

# External Secrets
# You need to leave blank oneuptimeSecret, encryptionSecret, and registerProbeKey to use this section
externalSecrets:
  oneuptimeSecret:
    existingSecret:
      name:
      passwordKey:
  encryptionSecret:
    existingSecret:
      name:
      passwordKey:
  registerProbeKey:
    existingSecret:
      name:
      passwordKey:

deployment:
  # When set to true, no OneUptime deployments are provisioned. Only databases (Redis, ClickHouse, Postgres) will be running.
  disableDeployments: false
  # Default replica count for all deployments
  replicaCount: 1
  # Update strategy type for all deployments
  updateStrategy:
    type: RollingUpdate
  # Dynamic timestamp label to force updates
  includeTimestampLabel: true

metalLb:
  enabled: false
  ipAdddressPool:
    enabled: false
    addresses:
      # - 51.158.55.153/32 # List of IP addresses of all the servers in the cluster.

nginx:
  # OneUptime ships with its own ingress gateway container, so Kubernetes Ingress resources are not required.
  enabled: true
  replicaCount: 1
  disableTelemetryCollection: false
  disableAutoscaler: false
  listenAddress: ""
  listenOptions: ""
  serverNamesHash:
    bucketSize: ""
    maxSize: ""
  ports:
    http: 80
    https: 443
  service:
    loadBalancerIP:
    loadBalancerClass:
    annotations:
    type: LoadBalancer
    externalIPs:
      # - 51.158.55.153 # Please make sure this is the same as the one in metalLb.ipAdddressPool.addresses
  resources: {}
  nodeSelector: {}
  podSecurityContext: {}
  hostAliases: []
  containerSecurityContext: {}

postgresql:
  enabled: true # Set this to false if you're using an external postgresql database.
  image:
    repository: postgres
    tag: latest
    pullPolicy: IfNotPresent
  auth:
    database: oneuptimedb
    # Username is fixed to "postgres"
    # Will be auto-generated if not provided
    postgresPassword:
  primary:
    service:
      type: ClusterIP
      ports:
        postgresql: "5432"
    terminationGracePeriodSeconds: 0 # We do this because we do not want to wait for the pod to terminate in case of node failure. https://medium.com/tailwinds-navigator/kubernetes-tip-how-statefulsets-behave-differently-than-deployments-when-node-fails-d29e36bca7d5
    persistence:
      enabled: true
      size: 25Gi
      storageClass: ""
    nodeSelector: {}
    tolerations: []
    affinity: {}
    podSecurityContext: {}
    containerSecurityContext: {}
    resources: {}
    configuration: |-
      # Network and connection settings
      listen_addresses = '*'
      port = 5432
      # Core tuning (adjust as needed)
      max_connections = 100
      shared_buffers = 128MB
    # pg_hba.conf rules. These enable password auth (md5) from any host/IP.
    # Tighten these for production to your pod/service/network CIDRs.
    hbaConfiguration: |-
      # Local connections (needed for initdb/entrypoint to create databases)
      local   all             all                                     trust
      # Allow all IPv4 and IPv6 clients with md5 password auth
      host    all             all             0.0.0.0/0               md5
      host    all             all             ::/0                    md5

# =============================================================================
# Operator-managed PostgreSQL (opt-in). A SEPARATE top-level object — NOT nested
# under "postgresql" above. When postgresOperator.cnpg.enabled is true:
#   * the postgresql StatefulSet / Service / ConfigMaps above are NOT rendered;
#   * an operator-managed CloudNativePG "Cluster" is created instead;
#   * the CloudNativePG operator is installed as a bundled chart dependency
#     (gated by this flag — see Chart.yaml; tune the operator itself under the
#     top-level "cloudnative-pg:" section at the bottom of this file).
#
# The OneUptime app connects as the "postgres" superuser (drop-in replacement
# for the StatefulSet). This object is self-contained — it does not read any
# postgresql.* values. "cnpg" is nested so other operators can be added later.
#
# NOTE: enabling this bootstraps a FRESH, empty cluster (initdb). It does NOT
# migrate data from an existing StatefulSet — see HelmChart/Docs/Postgres.md.
postgresOperator:
  cnpg:
    enabled: false
    # 1 = single primary. >1 = primary + (N-1) hot standbys for HA.
    instances: 1
    # PostgreSQL operand image. Pin a specific minor for production (e.g. "17.4").
    imageName: "ghcr.io/cloudnative-pg/postgresql:latest"
    # Application database and its owner role, created at bootstrap.
    database: oneuptimedb
    owner: oneuptime
    # postgres superuser password. Auto-generated if empty; preserved on upgrade.
    postgresPassword:
    persistence:
      size: 25Gi
      storageClass: ""
    # Extra postgresql.conf parameters. CloudNativePG manages everything else.
    parameters:
      max_connections: "100"
      shared_buffers: "128MB"
    resources: {}
    nodeSelector: {}
    tolerations: []
    # Advanced: extra CloudNativePG AffinityConfiguration fields merged into
    # spec.affinity (e.g. podAntiAffinityType, topologyKey).
    affinity: {}

clickhouse:
  enabled: true
  auth:
    username: oneuptime
    # Will be auto-generated if not provided
    password:
    # Use an existing secret for the ClickHouse password
    existingSecret:
      name:
      passwordKey:
  image:
    repository: clickhouse/clickhouse-server
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    ports:
      http: "8123"
      tcp: "9000"
      mysql: "9004"
      postgresql: "9005"
      interserver: "9009"
  persistence:
    enabled: true
    size: 25Gi
    storageClass: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podSecurityContext: {}
  containerSecurityContext: {}
  resources: {}
  # Custom ClickHouse configuration
  configuration: |-
    <clickhouse>
        <merge_tree>
            <max_suspicious_broken_parts>1000</max_suspicious_broken_parts>
        </merge_tree>
        <logger>
            <level>warning</level>
            <console>true</console>
        </logger>
        <http_port>8123</http_port>
        <tcp_port>9000</tcp_port>
        <mysql_port>9004</mysql_port>
        <postgresql_port>9005</postgresql_port>
        <interserver_http_port>9009</interserver_http_port>
        <listen_host>::</listen_host>

        <!-- System log retention: 6 hour TTL to prevent unbounded disk growth -->
        <query_log>
            <database>system</database>
            <table>query_log</table>
            <partition_by>toYYYYMM(event_date)</partition_by>
            <ttl>event_date + INTERVAL 6 HOUR DELETE</ttl>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        </query_log>
        <trace_log>
            <database>system</database>
            <table>trace_log</table>
            <partition_by>toYYYYMM(event_date)</partition_by>
            <ttl>event_date + INTERVAL 6 HOUR DELETE</ttl>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        </trace_log>
        <text_log>
            <database>system</database>
            <table>text_log</table>
            <partition_by>toYYYYMM(event_date)</partition_by>
            <ttl>event_date + INTERVAL 6 HOUR DELETE</ttl>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        </text_log>
        <part_log>
            <database>system</database>
            <table>part_log</table>
            <partition_by>toYYYYMM(event_date)</partition_by>
            <ttl>event_date + INTERVAL 6 HOUR DELETE</ttl>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        </part_log>
        <metric_log>
            <database>system</database>
            <table>metric_log</table>
            <partition_by>toYYYYMM(event_date)</partition_by>
            <ttl>event_date + INTERVAL 6 HOUR DELETE</ttl>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        </metric_log>
        <asynchronous_metric_log>
            <database>system</database>
            <table>asynchronous_metric_log</table>
            <partition_by>toYYYYMM(event_date)</partition_by>
            <ttl>event_date + INTERVAL 6 HOUR DELETE</ttl>
            <flush_interval_milliseconds>7500</flush_interval_milliseconds>
        </asynchronous_metric_log>
        <!-- Disable processors_profile_log entirely — it was 536 GiB and is not needed -->
        <processors_profile_log remove="1" />

        <allow_no_password>0</allow_no_password>
        <allow_implicit_no_password>0</allow_implicit_no_password>
        <users>
            <${CLICKHOUSE_USER}>
                <password>${CLICKHOUSE_PASSWORD}</password>
                <networks>
                    <ip>::/0</ip>
                </networks>
                <profile>default</profile>
                <quota>default</quota>
                <access_management>1</access_management>
            </${CLICKHOUSE_USER}>
        </users>
        <quotas>
            <default>
                <interval>
                    <duration>3600</duration>
                    <queries>0</queries>
                    <errors>0</errors>
                    <result_rows>0</result_rows>
                    <read_rows>0</read_rows>
                    <execution_time>0</execution_time>
                </interval>
            </default>
        </quotas>
    </clickhouse>

redis:
  enabled: true
  auth:
    # Will be auto-generated if not provided
    password:
    # Use an existing secret for the Redis password
    existingSecret:
      name:
      passwordKey:
  image:
    repository: redis
    tag: latest
    pullPolicy: IfNotPresent
  master:
    service:
      type: ClusterIP
      ports:
        redis: "6379"
    persistence:
      enabled: false
      size: 8Gi
      storageClass: ""
    nodeSelector: {}
    tolerations: []
    affinity: {}
    # Optional: override global security contexts just for the Redis pod/container
    podSecurityContext: {}
    containerSecurityContext: {}
    resources: {}
  commonConfiguration: |-
    appendonly no
    save ""
    maxmemory-policy noeviction



autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeEnvironment: production

billing:
  enabled: false
  publicKey:
  privateKey:
  # Stripe webhook secret for automatic invoice emails (get from Stripe Dashboard > Developers > Webhooks)
  webhookSecret: 
  smsDefaultValueInCents:
  whatsAppTextDefaultValueInCents:
  callDefaultValueInCentsPerMinute:
  smsHighRiskValueInCents:
  callHighRiskValueInCentsPerMinute:
  allowedActiveMonitorCountInFreePlan: 10
  telemetry:
    averageSpanRowSizeInBytes: 1024
    averageLogRowSizeInBytes: 1024
    averageMetricRowSizeInBytes: 1024
    averageExceptionRowSizeInBytes: 1024
    averageProfileRowSizeInBytes: 1024
    averageProfileSampleRowSizeInBytes: 512

subscriptionPlan:
  basic:
  growth:
  scale:
  enterprise:

analytics:
  host:
  key:


# CAPTCHA Configuration
# We support hCaptcha. You can get site key and secret key from https://hcaptcha.com/
captcha:
  enabled: false
  siteKey:
  secretKey:

# VAPID Configuration for Web Push Notifications
# Generate VAPID keys using: npx web-push generate-vapid-keys
vapid:
  publicKey:
  privateKey:
  subject: mailto:support@oneuptime.com

# Expo access token for sending mobile push notifications directly via Expo SDK.
# If not set, notifications are relayed through the push notification relay URL.
expo:
  accessToken:

# Push notification relay URL for self-hosted instances without Expo credentials
pushNotification:
  relayUrl: https://oneuptime.com/api/notification/push-relay/send

incidents:
  disableAutomaticCreation: false

alerts:
  disableAutomaticCreation: false

# Telemetry ingestion controls
# Set disableIngestion to true to reject all incoming OpenTelemetry traces /
# metrics / logs / profiles (HTTP + gRPC), Fluentd logs, Syslog logs, and
# Pyroscope profiles. Endpoints stay reachable and return success quickly so
# clients do not retry, but no data is queued or persisted.
telemetry:
  disableIngestion: false

# If you would like to attach status page to custom domains use this setting.
# For example, lets say you would like the status page to be hosted on status.yourcompany.com, then
# 1. Create a A record in your DNS provider with the name "oneuptime.yourcompany.com" and value to Public IP of the server oneuptime is deployed on.
# 2. Set the statusPage.cnameRecord to "oneuptime.yourcompany.com"
# 3. Create CNAME record in your DNS provider with the name "status.yourcompany.com" and value "oneuptime.yourcompany.com"
statusPage:
  cnameRecord:

# If you would like to attach public dashboards to custom domains use this setting.
# Works the same way as statusPage.cnameRecord but for dashboards.
# For example, if you want dashboard.yourcompany.com to show a public dashboard:
# 1. Set the dashboard.cnameRecord to "oneuptime.yourcompany.com"
# 2. Create CNAME record in your DNS provider with the name "dashboard.yourcompany.com" and value "oneuptime.yourcompany.com"
dashboard:
  cnameRecord:

probes:
  one:
    name: "Probe"
    description: "Probe"
    enabled: true
    monitoringWorkers: 3
    monitorFetchLimit: 10
    monitorRetryLimit: 3
    key:
    replicaCount: 1
    syntheticMonitorScriptTimeoutInMs: 60000
    customCodeMonitorScriptTimeoutInMs: 60000
    disableTelemetryCollection: false
    enableProfiling: false
    disableAutoscaler: false
    ports:
      http: 3874
    # Proxy configuration for probe connections
    proxy:
      # HTTP proxy URL for HTTP requests (optional)
      # Format: http://[username:password@]proxy.server.com:port
      # Example: http://proxy.example.com:8080
      # Example with auth: http://username:password@proxy.example.com:8080
      httpProxyUrl:
      # HTTPS proxy URL for HTTPS requests (optional)
      # Format: http://[username:password@]proxy.server.com:port
      # Example: http://proxy.example.com:8080
      # Example with auth: http://username:password@proxy.example.com:8080
      httpsProxyUrl:
      # Comma-separated list of hosts that should bypass the proxy (optional)
      # Example: localhost,.internal.example.com,10.0.0.0/8
      noProxy:
    # KEDA autoscaling configuration based on monitor queue metrics
    keda:
      enabled: false
      minReplicas: 1
      maxReplicas: 100
      # Scale up when queue size exceeds this threshold per probe
      queueSizeThreshold: 10
      # Polling interval for metrics (in seconds)
      pollingInterval: 30
      # Cooldown period after scaling (in seconds)
      cooldownPeriod: 300
      # Fallback used when KEDA cannot read the metrics-api endpoint
      # (e.g. all pods are down). Prevents HPA from flapping between
      # min/max when the metric goes <unknown>. Set replicas to 0 to disable.
      # Note: only applies to the metrics-api trigger, not cpu/memory.
      fallback:
        failureThreshold: 3
        replicas: 1
    resources: {}
    nodeSelector: {}
    podSecurityContext: {}
    hostAliases: []
    containerSecurityContext: {}
#   additionalContainers:
# two:
#   name: "Probe 2"
#   description: "Probe 2"
#   monitoringWorkers: 3
#   monitorFetchLimit: 10
#   key:
#   replicaCount: 1
#   ports:
#     http: 3874
#   syntheticMonitorScriptTimeoutInMs: 60000
#   customCodeMonitorScriptTimeoutInMs: 60000
#   disableTelemetryCollection: false
#   disableAutoscaler: false
#   # Proxy configuration for probe connections
#   proxy:
#     # HTTP proxy URL for HTTP requests (optional)
