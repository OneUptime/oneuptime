{{- /*
  Validate the blog volume mode before rendering.
    - emptyDir: per-pod ephemeral clone; safe at any replica count.
    - pvc: a single ReadWriteOnce PVC can attach to only one pod, so it is
      incompatible with multiple Home replicas or the Home autoscaler. Fail fast
      with a clear message instead of a Deployment that deadlocks on multi-attach.
    - statefulset: each replica gets its OWN ReadWriteOnce PVC (volumeClaimTemplates),
      so it scales freely (multiple replicas / autoscaler) and needs no such guard.
*/ -}}
{{- if $.Values.home.enabled }}
  {{- if not (has $.Values.home.blog.mode (list "emptyDir" "pvc" "statefulset")) }}
    {{- fail (printf "home.blog.mode must be one of emptyDir, pvc, or statefulset (got %q)" $.Values.home.blog.mode) }}
  {{- end }}
  {{- if eq $.Values.home.blog.mode "pvc" }}
    {{- /* Effective count mirrors the Deployment's own replicas logic below: it
       falls back to deployment.replicaCount when home.replicaCount is unset, so the
       guard cannot be bypassed by leaving home.replicaCount null. */}}
    {{- $effectiveReplicas := ($.Values.home.replicaCount | default $.Values.deployment.replicaCount | default 1) }}
    {{- if gt (int $effectiveReplicas) 1 }}
      {{- fail "home.blog.mode=pvc requires a single Home replica: a ReadWriteOnce blog volume cannot be shared across replicas. Set home.replicaCount=1 (or deployment.replicaCount=1), use home.blog.mode=statefulset to run multiple replicas (each with its own cached clone), or home.blog.mode=emptyDir." }}
    {{- end }}
    {{- if and (eq (include "oneuptime.autoscalingEnabled" (dict "Values" $.Values "Override" $.Values.home.autoscaling)) "true") (not $.Values.home.disableAutoscaler) }}
      {{- fail "home.blog.mode=pvc is incompatible with the Home autoscaler (a ReadWriteOnce volume cannot attach to multiple pods). Set home.disableAutoscaler=true with home.replicaCount=1, or use home.blog.mode=statefulset / emptyDir." }}
    {{- end }}
  {{- end }}
{{- end }}

{{- /* statefulset mode renders Home as a StatefulSet with a per-pod PVC so it
   scales horizontally with a persistent per-replica blog cache. */ -}}
{{- $isStatefulSet := eq $.Values.home.blog.mode "statefulset" -}}

{{- if and $.Values.home.enabled (not $.Values.deployment.disableDeployments) }}
# OneUptime Home {{ if $isStatefulSet }}StatefulSet{{ else }}Deployment{{ end }}
apiVersion: apps/v1
kind: {{ if $isStatefulSet }}StatefulSet{{ else }}Deployment{{ end }}
metadata:
  name: {{ printf "%s-%s" $.Release.Name "home"  }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ printf "%s-%s" $.Release.Name "home"  }}
    app.kubernetes.io/part-of: oneuptime
    app.kubernetes.io/managed-by: Helm
    appname: oneuptime
    {{- if $.Values.deployment.includeTimestampLabel }}
    date: "{{ now | unixEpoch }}"
    {{- end }}
spec:
  {{- if $isStatefulSet }}
  # Each replica (home-0, home-1, ...) gets its own PVC via volumeClaimTemplates
  # (below), so the blog clone is cached per pod and survives restarts while the
  # set still scales out. serviceName points at the headless Service (required for
  # StatefulSet pod identity); Parallel management starts/scales replicas
  # independently — a stateless frontend needs no ordering, and each per-pod clone
  # then runs concurrently instead of one pod at a time.
  serviceName: {{ printf "%s-%s" $.Release.Name "home-headless" }}
  podManagementPolicy: {{ $.Values.home.blog.statefulset.podManagementPolicy | default "Parallel" }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ printf "%s-%s" $.Release.Name "home"  }}
  {{- if $.Values.home.replicaCount }}
  replicas: {{ $.Values.home.replicaCount }}
  {{- else }}
  {{- if or (not (eq (include "oneuptime.autoscalingEnabled" (dict "Values" $.Values "Override" $.Values.home.autoscaling)) "true")) ($.Values.home.disableAutoscaler) }}
  replicas: {{ $.Values.deployment.replicaCount }}
  {{- end }}
  {{- end }}
  {{- if $isStatefulSet }}
  # StatefulSet takes updateStrategy (not the Deployment-style strategy). Rolling
  # replaces pods highest-ordinal first; each replacement re-uses its own PVC, so
  # there is no re-clone and no cross-pod volume contention.
  updateStrategy:
    type: RollingUpdate
  {{- else if eq $.Values.home.blog.mode "pvc" }}
  # A ReadWriteOnce blog volume attaches to one pod at a time, so a replacement
  # pod cannot start until the old one releases it. Recreate avoids the resulting
  # rollout deadlock (RollingUpdate would try to attach the volume to two pods).
  strategy:
    type: Recreate
  {{- else }}
  strategy: {{- toYaml $.Values.deployment.updateStrategy | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        app: {{ printf "%s-%s" $.Release.Name "home"  }}
        {{- if $.Values.deployment.includeTimestampLabel }}
        date: "{{ now | unixEpoch }}"
        {{- end }}
        appname: oneuptime
    spec:
      {{- if $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml $.Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      # fsGroup makes the blog volume (emptyDir/PVC) group-owned by GID 1000 so the
      # non-root `node` user (which clones/pulls the blog) can write to it. Any
      # user-provided podSecurityContext keys win; fsGroup is only defaulted when
      # the operator has not set it. OnRootMismatch keeps PVC remounts cheap.
      securityContext:
        {{- $homePodSecCtx := dict }}
        {{- if $.Values.home.podSecurityContext }}
        {{- $homePodSecCtx = $.Values.home.podSecurityContext }}
        {{- else if $.Values.podSecurityContext }}
        {{- $homePodSecCtx = $.Values.podSecurityContext }}
        {{- end }}
        {{- if not (hasKey $homePodSecCtx "fsGroup") }}
        fsGroup: 1000
        {{- end }}
        {{- if not (hasKey $homePodSecCtx "fsGroupChangePolicy") }}
        fsGroupChangePolicy: OnRootMismatch
        {{- end }}
        {{- if $homePodSecCtx }}
        {{- toYaml $homePodSecCtx | nindent 8 }}
        {{- end }}
      {{- if $.Values.home.hostAliases }}
      hostAliases:
        {{- toYaml $.Values.home.hostAliases | nindent 8 }}
      {{- else if $.Values.hostAliases }}
      hostAliases:
        {{- toYaml $.Values.hostAliases | nindent 8 }}
      {{- end }}
      {{- if $.Values.affinity }}
      affinity: {{- $.Values.affinity | toYaml | nindent 8 }}
      {{- end }}
      {{- if $.Values.tolerations }}
      tolerations: {{- $.Values.tolerations | toYaml | nindent 8 }}
      {{- end }}
      {{- if $.Values.home.nodeSelector }}
      nodeSelector:
        {{- toYaml $.Values.home.nodeSelector | nindent 8 }}
      {{- else if $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml $.Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if not $.Values.home.blog.skipDownload }}
      initContainers:
        # Clone the blog into the mounted volume before Home starts, so the pod is
        # not Ready (and takes no traffic) until the blog is present. Idempotent:
        # skips the clone when the volume already holds the repo (e.g. a pvc-mode
        # restart). Uses the Home image (which ships git + bash).
        - name: clone-blog
          image: {{ include "oneuptime.image" (dict "Values" $.Values "ServiceName" "home") }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          {{- if $.Values.home.containerSecurityContext }}
          securityContext:
            {{- toYaml $.Values.home.containerSecurityContext | nindent 12 }}
          {{- else if $.Values.containerSecurityContext }}
          securityContext:
            {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
          {{- end }}
          env:
            - name: BLOG_ROOT_PATH
              value: {{ $.Values.home.blog.rootPath | quote }}
            - name: BLOG_REPOSITORY_URL
              value: {{ $.Values.home.blog.repoUrl | quote }}
            - name: BLOG_CLONE_FILTER
              value: {{ $.Values.home.blog.cloneFilter | quote }}
            # Abort a stalled clone (transfer < 1KB/s for 20s) rather than hanging
            # the pod in Init — init containers are not covered by the probes.
            - name: GIT_HTTP_LOW_SPEED_LIMIT
              value: "1000"
            - name: GIT_HTTP_LOW_SPEED_TIME
              value: "20"
          command:
            - bash
            - -c
            - |
              set -eu
              REPO_DIR="${BLOG_ROOT_PATH:-/usr/src/blog}"
              # Only a repo with a real HEAD commit counts as "already cloned". An
              # interrupted clone leaves a .git with no HEAD (which
              # rev-parse --is-inside-work-tree would still accept), so gate on
              # --verify HEAD to force a clean re-clone of a partial repo.
              if git -C "$REPO_DIR" rev-parse --verify HEAD >/dev/null 2>&1; then
                echo "blog repo already present at $REPO_DIR; skipping clone"
              else
                filter_arg=""
                if [ -n "${BLOG_CLONE_FILTER:-}" ]; then
                  filter_arg="--filter=${BLOG_CLONE_FILTER}"
                fi
                attempt=0
                cloned=""
                max_attempts={{ $.Values.home.blog.initContainer.cloneRetries | default 5 }}
                until [ "$attempt" -ge "$max_attempts" ]; do
                  attempt=$((attempt + 1))
                  echo "cloning blog into $REPO_DIR (attempt ${attempt}/${max_attempts})"
                  rm -rf "$REPO_DIR"/* "$REPO_DIR"/.[!.]* 2>/dev/null || true
                  if timeout {{ $.Values.home.blog.initContainer.cloneTimeoutSeconds | default 600 }} git clone $filter_arg --no-tags "$BLOG_REPOSITORY_URL" "$REPO_DIR" \
                    && git -C "$REPO_DIR" rev-parse --verify HEAD >/dev/null 2>&1; then
                    cloned="yes"
                    break
                  fi
                  echo "clone attempt ${attempt} failed; retrying in 10s..."
                  sleep 10
                done
                if [ -z "$cloned" ]; then
                  # Fail open: never block Home (marketing/product/docs) on a blog
                  # clone that cannot reach its source. Leave the volume empty and
                  # clean; the app's UpdateBlog cron (clone-if-missing, on startup +
                  # every few hours) fills in /blog once the source is reachable.
                  # Blog pages degrade to empty meanwhile.
                  echo "WARNING: blog clone did not complete after ${max_attempts} attempts; starting Home without the blog. UpdateBlog will keep retrying." >&2
                  rm -rf "$REPO_DIR"/* "$REPO_DIR"/.[!.]* 2>/dev/null || true
                  exit 0
                fi
              fi
              # Keep rename detection off so the contributor `git log` walk never
              # lazily re-fetches the omitted historical blobs on a partial clone.
              git -C "$REPO_DIR" config diff.renames false || true
              echo "blog ready at $REPO_DIR"
          volumeMounts:
            - name: blog
              mountPath: {{ $.Values.home.blog.rootPath | quote }}
          {{- if $.Values.home.blog.initContainer.resources }}
          resources:
            {{- toYaml $.Values.home.blog.initContainer.resources | nindent 12 }}
          {{- end }}
      {{- end }}
      containers:
        - image: {{ include "oneuptime.image" (dict "Values" $.Values "ServiceName" "home") }}
          name: {{ printf "%s-%s" $.Release.Name "home"  }}
          {{- if $.Values.startupProbe.enabled }}
          # Startup probe
          startupProbe:
            httpGet:
              path: /status/live
              port: {{ $.Values.home.ports.http }}
            periodSeconds: {{ $.Values.startupProbe.periodSeconds }}
            failureThreshold: {{ $.Values.startupProbe.failureThreshold }}
            timeoutSeconds: 10
            initialDelaySeconds: 30
          {{- end }}
          {{- if $.Values.livenessProbe.enabled }}
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /status/live
              port: {{ $.Values.home.ports.http }}
            periodSeconds: {{ $.Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ $.Values.livenessProbe.timeoutSeconds }}
            initialDelaySeconds: {{ $.Values.livenessProbe.initialDelaySeconds }}
          {{- end }}
          {{- if $.Values.readinessProbe.enabled }}
          # Readyness Probe
          readinessProbe:
            httpGet:
              path: /status/ready
              port: {{ $.Values.home.ports.http }}
            periodSeconds: {{ $.Values.readinessProbe.periodSeconds }}
            initialDelaySeconds: {{ $.Values.readinessProbe.initialDelaySeconds }}
            timeoutSeconds: {{ $.Values.readinessProbe.timeoutSeconds }}
          {{- end }}
          {{- if $.Values.home.containerSecurityContext }}
          securityContext:
            {{- toYaml $.Values.home.containerSecurityContext | nindent 12 }}
          {{- else if $.Values.containerSecurityContext }}
          securityContext:
            {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
          {{- end }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          env:
            {{- include "oneuptime.env.common" . | nindent 12 }}
            {{- include "oneuptime.env.runtime" (dict "Values" $.Values "Release" $.Release) | nindent 12 }}
            - name: PORT
              value: {{ $.Values.home.ports.http | quote }}
            - name: DISABLE_TELEMETRY
              value: {{ $.Values.home.disableTelemetryCollection | quote }}
            - name: ENABLE_PROFILING
              value: {{ $.Values.home.enableProfiling | quote }}
            # Keep in sync with the clone-blog initContainer so the UpdateBlog cron
            # (clone-if-missing + git pull) reads/writes the same mounted volume.
            - name: BLOG_ROOT_PATH
              value: {{ $.Values.home.blog.rootPath | quote }}
            - name: BLOG_REPOSITORY_URL
              value: {{ $.Values.home.blog.repoUrl | quote }}
            - name: BLOG_CLONE_FILTER
              value: {{ $.Values.home.blog.cloneFilter | quote }}
            # Emergency kill-switch: when true the clone initContainer is skipped
            # and the UpdateBlog job does nothing, so Home starts with no blog
            # (blog pages degrade to empty; marketing/product/docs are unaffected).
            - name: BLOG_SKIP_DOWNLOAD
              value: {{ $.Values.home.blog.skipDownload | quote }}
          ports:
            - containerPort: {{ $.Values.home.ports.http }}
              protocol: TCP
              name: http
          volumeMounts:
            - name: blog
              mountPath: {{ $.Values.home.blog.rootPath | quote }}
          {{- if $.Values.home.resources }}
          resources:
            {{- toYaml $.Values.home.resources | nindent 12 }}
          {{- end }}
      {{- if not $isStatefulSet }}
      volumes:
        - name: blog
          {{- if eq $.Values.home.blog.mode "pvc" }}
          persistentVolumeClaim:
            claimName: {{ printf "%s-%s" $.Release.Name "home-blog" }}
          {{- else }}
          emptyDir:
            {{- if $.Values.home.blog.volume.sizeLimit }}
            sizeLimit: {{ $.Values.home.blog.volume.sizeLimit }}
            {{- end }}
          {{- end }}
      {{- end }}
      restartPolicy: {{ $.Values.image.restartPolicy }}
  {{- if $isStatefulSet }}
  # Per-replica blog cache. Each pod gets its own PVC (blog-<release>-home-<ordinal>),
  # cloned once by the init container and re-used across restarts. ReadWriteOnce is
  # correct precisely because every pod owns a distinct volume — there is no sharing
  # and no multi-attach, so the set scales freely.
  {{- $ret := $.Values.home.blog.persistence.retentionPolicy }}
  {{- if $ret }}
  # Needs Kubernetes >= 1.27. Retain (default) keeps a scaled-down pod's cache so
  # scaling back up re-uses it; set to Delete to reclaim the storage instead.
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: {{ $ret.whenDeleted | default "Retain" }}
    whenScaled: {{ $ret.whenScaled | default "Retain" }}
  {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: blog
        labels:
          app: {{ printf "%s-%s" $.Release.Name "home" }}
          app.kubernetes.io/part-of: oneuptime
          app.kubernetes.io/managed-by: Helm
          appname: oneuptime
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if $.Values.home.blog.persistence.storageClass }}
        {{- if eq $.Values.home.blog.persistence.storageClass "-" }}
        storageClassName: ""
        {{- else }}
        storageClassName: {{ $.Values.home.blog.persistence.storageClass }}
        {{- end }}
        {{- else }}
        {{- if $.Values.global.storageClass }}
        storageClassName: {{ $.Values.global.storageClass }}
        {{- end }}
        {{- end }}
        resources:
          requests:
            storage: {{ $.Values.home.blog.persistence.size }}
  {{- end }}

---

# OneUptime home autoscaler
{{- if not $.Values.home.disableAutoscaler }}
{{- $homeAutoScalerArgs := dict "ServiceName" "home" "Release" $.Release "Values" $.Values "Override" $.Values.home.autoscaling "ScaleTargetKind" (ternary "StatefulSet" "Deployment" $isStatefulSet) -}}
{{- include "oneuptime.autoscaler" $homeAutoScalerArgs }}
{{- end }}
---

{{- end }}

{{- if and $.Values.home.enabled (not $.Values.deployment.disableDeployments) }}
# OneUptime home Service
{{- $homePorts := $.Values.home.ports -}}
{{- $homeServiceArgs := dict "ServiceName" "home" "Ports" $homePorts "Release" $.Release "Values" $.Values -}}
{{- include "oneuptime.service" $homeServiceArgs }}
---
{{- end }}

{{- if and $.Values.home.enabled (not $.Values.deployment.disableDeployments) $isStatefulSet }}
# OneUptime home headless Service — required by the StatefulSet's serviceName to
# give each replica a stable network identity. Real traffic is still load-balanced
# by the regular ClusterIP `home` Service above; this one is headless (clusterIP:
# None). publishNotReadyAddresses lets peers resolve pods before they pass readiness.
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-%s" $.Release.Name "home-headless" }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ printf "%s-%s" $.Release.Name "home" }}
    app.kubernetes.io/part-of: oneuptime
    app.kubernetes.io/managed-by: Helm
    appname: oneuptime
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: {{ printf "%s-%s" $.Release.Name "home" }}
  ports:
    {{- range $key, $val := $.Values.home.ports }}
    - port: {{ $val }}
      targetPort: {{ $val }}
      name: {{ $key }}
    {{- end }}
---
{{- end }}

{{- if and $.Values.home.enabled (not $.Values.deployment.disableDeployments) }}
# OneUptime home PodDisruptionBudget
{{- include "oneuptime.pdb" (dict "ServiceName" "home" "Override" $.Values.home.podDisruptionBudget "Release" $.Release "Values" $.Values) }}
{{- end }}

{{- if and $.Values.home.enabled (not $.Values.deployment.disableDeployments) (eq $.Values.home.blog.mode "pvc") }}
---
# OneUptime Home blog PersistentVolumeClaim (optional pvc mode).
# ReadWriteOnce: a single Home replica owns this cached blog clone so it is paid
# once and survives pod restarts. Requires home.replicaCount=1 (enforced above).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ printf "%s-%s" $.Release.Name "home-blog" }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ printf "%s-%s" $.Release.Name "home" }}
    app.kubernetes.io/part-of: oneuptime
    app.kubernetes.io/managed-by: Helm
    appname: oneuptime
spec:
  accessModes:
    - ReadWriteOnce
  {{- if $.Values.home.blog.persistence.storageClass }}
  {{- if eq $.Values.home.blog.persistence.storageClass "-" }}
  storageClassName: ""
  {{- else }}
  storageClassName: {{ $.Values.home.blog.persistence.storageClass }}
  {{- end }}
  {{- else }}
  {{- if $.Values.global.storageClass }}
  storageClassName: {{ $.Values.global.storageClass }}
  {{- end }}
  {{- end }}
  resources:
    requests:
      storage: {{ $.Values.home.blog.persistence.size }}
{{- end }}
