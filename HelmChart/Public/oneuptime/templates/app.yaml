{{- if and $.Values.app.enabled (not $.Values.deployment.disableDeployments) }}
# OneUptime app Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-%s" $.Release.Name "app"  }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ printf "%s-%s" $.Release.Name "app"  }}
    app.kubernetes.io/part-of: oneuptime
    app.kubernetes.io/managed-by: Helm
    appname: oneuptime
    {{- if $.Values.deployment.includeTimestampLabel }}
    date: "{{ now | unixEpoch }}"
    {{- end }}
spec:
  selector:
    matchLabels:
      app: {{ printf "%s-%s" $.Release.Name "app"  }}
  {{- if not (and $.Values.keda.enabled $.Values.app.keda.enabled) }}
  {{- if and $.Values.app (hasKey $.Values.app "replicaCount") (ne $.Values.app.replicaCount nil) }}
  replicas: {{ $.Values.app.replicaCount }}
  {{- else }}
  {{- if or (not (eq (include "oneuptime.autoscalingEnabled" (dict "Values" $.Values "Override" $.Values.app.autoscaling)) "true")) ($.Values.app.disableAutoscaler) }}
  replicas: {{ $.Values.deployment.replicaCount }}
  {{- end }}
  {{- end }}
  {{- end }}
  strategy: {{- toYaml $.Values.deployment.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        app: {{ printf "%s-%s" $.Release.Name "app"  }}
        {{- if $.Values.deployment.includeTimestampLabel }}
        date: "{{ now | unixEpoch }}"
        {{- end }}
        appname: oneuptime
    spec:
      {{- if $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml $.Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if $.Values.app.podSecurityContext }}
      securityContext:
        {{- toYaml $.Values.app.podSecurityContext | nindent 8 }}
      {{- else if $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if $.Values.app.hostAliases }}
      hostAliases:
        {{- toYaml $.Values.app.hostAliases | nindent 8 }}
      {{- else if $.Values.hostAliases }}
      hostAliases:
        {{- toYaml $.Values.hostAliases | nindent 8 }}
      {{- end }}
      {{- if $.Values.affinity }}
      affinity: {{- $.Values.affinity | toYaml | nindent 8 }}
      {{- end }}
      {{- if $.Values.tolerations }}
      tolerations: {{- $.Values.tolerations | toYaml | nindent 8 }}
      {{- end }}
      {{- if $.Values.app.nodeSelector }}
      nodeSelector:
        {{- toYaml $.Values.app.nodeSelector | nindent 8 }}
      {{- else if $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml $.Values.nodeSelector | nindent 8 }}
      {{- end }}
      containers:
        - image: {{ include "oneuptime.image" (dict "Values" $.Values "ServiceName" "app") }}
          name: {{ printf "%s-%s" $.Release.Name "app"  }}
          # Liveness probe
          {{- if $.Values.startupProbe.enabled }}
          # Startup probe
          startupProbe:
            httpGet:
              path: /status/live
              port: {{ $.Values.app.ports.http }}
            periodSeconds: {{ $.Values.startupProbe.periodSeconds }}
            failureThreshold: {{ $.Values.startupProbe.failureThreshold }}
          {{- end }}
          {{- if $.Values.livenessProbe.enabled }}
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /status/live
              port: {{ $.Values.app.ports.http }}
            periodSeconds: {{ $.Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ $.Values.livenessProbe.timeoutSeconds }}
            initialDelaySeconds: {{ $.Values.livenessProbe.initialDelaySeconds }}
          {{- end }}
          {{- if $.Values.readinessProbe.enabled }}
          # Readyness Probe
          readinessProbe:
            httpGet:
              path: /status/ready
              port: {{ $.Values.app.ports.http }}
            periodSeconds: {{ $.Values.readinessProbe.periodSeconds }}
            initialDelaySeconds: {{ $.Values.readinessProbe.initialDelaySeconds }}
            timeoutSeconds: {{ $.Values.readinessProbe.timeoutSeconds }}
          {{- end }}
          {{- if $.Values.app.containerSecurityContext }}
          securityContext:
            {{- toYaml $.Values.app.containerSecurityContext | nindent 12 }}
          {{- else if $.Values.containerSecurityContext }}
          securityContext:
            {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
          {{- end }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          env:
            {{- include "oneuptime.env.common" . | nindent 12 }}
            {{- include "oneuptime.env.runtime" (dict "Values" $.Values "Release" $.Release "DatabaseMaxOpenConnections" ($.Values.app.databaseMaxOpenConnections | default $.Values.deployment.databaseMaxOpenConnections)) | nindent 12 }}
            - name: PORT
              value: {{ $.Values.app.ports.http | quote }}
            - name: SMS_HIGH_RISK_COST_IN_CENTS
              value: {{ $.Values.billing.smsHighRiskValueInCents | quote }}
            - name: CALL_HIGH_RISK_COST_IN_CENTS_PER_MINUTE
              value: {{ $.Values.billing.callHighRiskValueInCentsPerMinute | quote }}
            - name: SMS_DEFAULT_COST_IN_CENTS
              value: {{ $.Values.billing.smsDefaultValueInCents | quote }}
            - name: WHATSAPP_TEXT_DEFAULT_COST_IN_CENTS
              value: {{ $.Values.billing.whatsAppTextDefaultValueInCents | quote }}
            - name: CALL_DEFAULT_COST_IN_CENTS_PER_MINUTE
              value: {{ $.Values.billing.callDefaultValueInCentsPerMinute | quote }}
            - name: DISABLE_TELEMETRY
              value: {{ $.Values.app.disableTelemetryCollection | quote }}
            - name: ENABLE_PROFILING
              value: {{ $.Values.app.enableProfiling | quote }}
            - name: TELEMETRY_CONCURRENCY
              value: {{ $.Values.app.telemetryConcurrency | default 100 | squote }}
            # Fan-in telemetry writer knobs (defaults match the code —
            # Common/Server/Utils/Telemetry/TelemetryFanInWriter.ts). Fleet-wide
            # ClickHouse insert concurrency is replicas x maxConcurrentInserts.
            - name: TELEMETRY_FANIN_MAX_BATCH_ROWS
              value: {{ $.Values.app.telemetryFanInMaxBatchRows | default 5000 | squote }}
            - name: TELEMETRY_FANIN_MAX_WAIT_MS
              value: {{ $.Values.app.telemetryFanInMaxWaitMs | default 1000 | squote }}
            - name: TELEMETRY_FANIN_MAX_CONCURRENT_INSERTS
              value: {{ $.Values.app.telemetryFanInMaxConcurrentInserts | default 4 | squote }}
            - name: TELEMETRY_FANIN_MAX_PENDING_ROWS
              value: {{ $.Values.app.telemetryFanInMaxPendingRows | default 100000 | squote }}
            - name: TELEMETRY_FANIN_RETRY_MAX_ATTEMPTS
              value: {{ $.Values.app.telemetryFanInRetryMaxAttempts | default 6 | squote }}
            - name: TELEMETRY_FANIN_RETRY_BASE_DELAY_MS
              value: {{ $.Values.app.telemetryFanInRetryBaseDelayMs | default 250 | squote }}
            - name: TELEMETRY_FANIN_RETRY_MAX_DELAY_MS
              value: {{ $.Values.app.telemetryFanInRetryMaxDelayMs | default 10000 | squote }}
            # Per-pod ClickHouse pool ceilings; the ingest pool inherits the
            # query pool size when unset (same fallback the code applies).
            - name: CLICKHOUSE_MAX_OPEN_CONNECTIONS
              value: {{ $.Values.app.clickhouseMaxOpenConnections | default 100 | squote }}
            - name: CLICKHOUSE_INGEST_MAX_OPEN_CONNECTIONS
              value: {{ $.Values.app.clickhouseIngestMaxOpenConnections | default ($.Values.app.clickhouseMaxOpenConnections | default 100) | squote }}
            {{- include "oneuptime.env.telemetryWriterUrl" . | nindent 12 }}
            # When the dedicated worker deployment is enabled, the app stops
            # consuming BullMQ queues so heavy background/telemetry processing
            # can't stall API requests on the shared event loop. Flips
            # atomically with worker.enabled — never leaves jobs un-consumed.
            - name: DISABLE_QUEUE_WORKERS
              value: {{ $.Values.worker.enabled | default false | quote }}
            {{- include "oneuptime.env.registerProbeKey" (dict "Values" $.Values "Release" $.Release) | nindent 12 }}
          ports:
            - containerPort: {{ $.Values.app.ports.http }}
              protocol: TCP
              name: http
            - containerPort: {{ $.Values.app.ports.grpc | default 4317 }}
              protocol: TCP
              name: grpc
            - containerPort: {{ $.Values.app.ports.mqtt | default 1883 }}
              protocol: TCP
              name: mqtt
          {{- if $.Values.app.resources }}
          resources:
            {{- toYaml $.Values.app.resources | nindent 12 }}
          {{- end }}
      restartPolicy: {{ $.Values.image.restartPolicy }}

---

# OneUptime app autoscaler (skip HPA when KEDA is managing scaling)
{{- if and (not $.Values.app.disableAutoscaler) (not (and $.Values.keda.enabled $.Values.app.keda.enabled)) }}
{{- $appAutoScalerArgs := dict "ServiceName" "app" "Release" $.Release "Values" $.Values "Override" $.Values.app.autoscaling -}}
{{- include "oneuptime.autoscaler" $appAutoScalerArgs }}
{{- end }}
---
{{- end }}

{{- if and $.Values.app.enabled (not $.Values.deployment.disableDeployments) }}
# OneUptime app Service
{{- $appPorts := dict "http" $.Values.app.ports.http "grpc" ($.Values.app.ports.grpc | default 4317) "mqtt" ($.Values.app.ports.mqtt | default 1883) -}}
{{- $appServiceArgs := dict "ServiceName" "app" "Ports" $appPorts "Release" $.Release "Values" $.Values -}}
{{- include "oneuptime.service" $appServiceArgs }}
---
{{- end }}

{{- if and $.Values.app.enabled (not $.Values.deployment.disableDeployments) }}
# OneUptime app PodDisruptionBudget
{{- include "oneuptime.pdb" (dict "ServiceName" "app" "Override" $.Values.app.podDisruptionBudget "Release" $.Release "Values" $.Values) }}
{{- end }}
