{{- if and .Values.clickhouse.enabled (not .Values.clickhouseOperator.altinity.enabled) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-clickhouse-shard0
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: clickhouse
    app.kubernetes.io/part-of: clickhouse
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    shard: "0"
spec:
  serviceName: {{ .Release.Name }}-clickhouse-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: clickhouse
      app.kubernetes.io/part-of: clickhouse
      shard: "0"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: clickhouse
        app.kubernetes.io/part-of: clickhouse
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        shard: "0"
      annotations:
        # Roll the pod when clickhouse.configuration changes — a ConfigMap edit alone
        # never restarts a StatefulSet, and config.xml is baked at pod start by the
        # init container (keeper_server is not hot-reloadable).
        checksum/config: {{ include (print $.Template.BasePath "/clickhouse-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Release.Name }}-clickhouse
      {{- with .Values.clickhouse.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.clickhouse.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.clickhouse.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.clickhouse.podSecurityContext }}
      {{- with .Values.clickhouse.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- else if .Values.podSecurityContext }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      initContainers:
      - name: clickhouse-config-init
        image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
        imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
        command:
        - /bin/sh
        - -c
        - |
          sed -e "s/\${CLICKHOUSE_USER}/$CLICKHOUSE_USER/g" \
              -e "s/\${CLICKHOUSE_PASSWORD}/$CLICKHOUSE_PASSWORD/g" \
              /etc/clickhouse-server/config-template/config.xml > /etc/clickhouse-server/config-output/config.xml
        env:
        - name: CLICKHOUSE_USER
          value: {{ .Values.clickhouse.auth.username | quote }}
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              {{- if .Values.clickhouse.auth.existingSecret.name }}
              name: {{ .Values.clickhouse.auth.existingSecret.name }}
              key: {{ .Values.clickhouse.auth.existingSecret.passwordKey }}
              {{- else }}
              name: {{ .Release.Name }}-clickhouse
              key: admin-password
              {{- end }}
        volumeMounts:
        - name: clickhouse-config-template
          mountPath: /etc/clickhouse-server/config-template
        - name: clickhouse-config
          mountPath: /etc/clickhouse-server/config-output
      containers:
      - name: clickhouse
        image: "{{ .Values.clickhouse.image.repository }}:{{ .Values.clickhouse.image.tag }}"
        imagePullPolicy: {{ .Values.clickhouse.image.pullPolicy }}
        {{- if .Values.clickhouse.containerSecurityContext }}
        securityContext:
          {{- with .Values.clickhouse.containerSecurityContext }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- else if .Values.containerSecurityContext }}
        securityContext:
          {{- with .Values.containerSecurityContext }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        {{- end }}
        ports:
        - name: http
          containerPort: 8123
          protocol: TCP
        - name: tcp
          containerPort: 9000
          protocol: TCP
        - name: mysql
          containerPort: 9004
          protocol: TCP
        - name: postgresql
          containerPort: 9005
          protocol: TCP
        - name: interserver
          containerPort: 9009
          protocol: TCP
        env:
        - name: CLICKHOUSE_USER
          value: {{ .Values.clickhouse.auth.username | quote }}
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              {{- if .Values.clickhouse.auth.existingSecret.name }}
              name: {{ .Values.clickhouse.auth.existingSecret.name }}
              key: {{ .Values.clickhouse.auth.existingSecret.passwordKey }}
              {{- else }}
              name: {{ .Release.Name }}-clickhouse
              key: admin-password
              {{- end }}
        - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
          value: "1"
        # ClickHouse can be slow to answer /ping while it loads a large number of
        # data parts at startup, or replays/cleans up merges that were interrupted
        # by a previous restart. The startupProbe grants a generous window (default
        # up to ~5 min: 30 x 10s) before liveness is allowed to act. Without it, a
        # slow start trips liveness, the kill interrupts in-flight merges, the next
        # start is even slower, and the pod enters a CrashLoop death spiral.
        {{- $sp := .Values.clickhouse.startupProbe | default dict }}
        startupProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: {{ $sp.initialDelaySeconds | default 10 }}
          periodSeconds: {{ $sp.periodSeconds | default 10 }}
          timeoutSeconds: {{ $sp.timeoutSeconds | default 5 }}
          failureThreshold: {{ $sp.failureThreshold | default 30 }}
        # Liveness is deliberately tolerant: once started, ClickHouse may be briefly
        # unresponsive to /ping while merging big parts. Only restart after a
        # sustained outage (default 6 x 15s = 90s) so a transient load spike does
        # not needlessly kill it and interrupt merges.
        {{- $lp := .Values.clickhouse.livenessProbe | default dict }}
        livenessProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: {{ $lp.initialDelaySeconds | default 30 }}
          periodSeconds: {{ $lp.periodSeconds | default 15 }}
          timeoutSeconds: {{ $lp.timeoutSeconds | default 10 }}
          failureThreshold: {{ $lp.failureThreshold | default 6 }}
        # Readiness gates the Service endpoints. timeoutSeconds must not be too tight
        # (the old 1s flapped the pod out of the Service under load, so clients saw
        # connection-refused even though ClickHouse was alive).
        {{- $rp := .Values.clickhouse.readinessProbe | default dict }}
        readinessProbe:
          httpGet:
            path: /ping
            port: http
          initialDelaySeconds: {{ $rp.initialDelaySeconds | default 10 }}
          periodSeconds: {{ $rp.periodSeconds | default 10 }}
          timeoutSeconds: {{ $rp.timeoutSeconds | default 5 }}
          failureThreshold: {{ $rp.failureThreshold | default 3 }}
        {{- with .Values.clickhouse.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /var/lib/clickhouse
          subPath: data
        - name: clickhouse-config
          mountPath: /etc/clickhouse-server/config.d/custom.xml
          subPath: config.xml
        # Profile-level drop-in (no secrets, so mounted straight from the ConfigMap —
        # no envsubst needed). Batches the background Distributed-insert sender so it
        # keeps up with telemetry volume; otherwise system.distribution_queue backs up
        # and dashboards lag. Mounted into users.d, where ClickHouse reads profiles.
        - name: clickhouse-config-template
          mountPath: /etc/clickhouse-server/users.d/distributed-insert-tuning.xml
          subPath: distributed-insert-tuning.xml
        - name: clickhouse-initdb
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: clickhouse-config-template
        configMap:
          name: {{ .Release.Name }}-clickhouse-config
      - name: clickhouse-config
        emptyDir: {}
      - name: clickhouse-secrets
        secret:
          secretName: {{ .Release.Name }}-clickhouse
      - name: clickhouse-initdb
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: clickhouse
    spec:
      accessModes: ["ReadWriteOnce"]
      {{- if .Values.clickhouse.persistence.storageClass }}
      {{- if eq .Values.clickhouse.persistence.storageClass "-" }}
      storageClassName: ""
      {{- else }}
      storageClassName: {{ .Values.clickhouse.persistence.storageClass }}
      {{- end }}
      {{- else }}
      {{- if .Values.global.storageClass }}
      storageClassName: {{ .Values.global.storageClass }}
      {{- end }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.clickhouse.persistence.size }}
{{- end }}
