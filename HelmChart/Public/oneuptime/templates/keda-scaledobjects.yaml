{{/*
KEDA ScaledObjects for various services
*/}}

{{/* Probe KEDA ScaledObjects - one for each probe configuration */}}
{{- range $key, $val := $.Values.probes }}
{{- $probeEnabled := or (not (hasKey $val "enabled")) $val.enabled }}
{{- if and $.Values.keda.enabled $probeEnabled (and $val.keda $val.keda.enabled) (not $val.disableAutoscaler) (not $.Values.deployment.disableDeployments) }}
{{- $serviceName := printf "probe-%s" $key }}
{{- $probePort := 3874 }}
{{- if and $val.ports $val.ports.http }}
{{- $probePort = $val.ports.http }}
{{- end }}
{{- $metricsConfig := dict "enabled" $val.keda.enabled "minReplicas" $val.keda.minReplicas "maxReplicas" $val.keda.maxReplicas "pollingInterval" $val.keda.pollingInterval "cooldownPeriod" $val.keda.cooldownPeriod "fallback" $val.keda.fallback "triggers" (list (dict "query" "oneuptime_probe_queue_size" "threshold" $val.keda.queueSizeThreshold "port" $probePort)) }}
{{- $probeKedaArgs := dict "ServiceName" $serviceName "Release" $.Release "Values" $.Values "MetricsConfig" $metricsConfig "DisableAutoscaler" $val.disableAutoscaler }}
{{- include "oneuptime.kedaScaledObject" $probeKedaArgs }}
{{- end }}
{{- end }}

{{/* App KEDA ScaledObject.
     Combined (default) mode: scales on combined queue size (worker + workflow + telemetry + runbook).
     Split mode (worker.enabled): the worker deployment drains the queues, so the app must
     NOT scale on queue depth — its queue-size trigger is dropped and it scales on CPU/memory. */}}
{{- if and .Values.keda.enabled .Values.app.enabled .Values.app.keda.enabled (not .Values.app.disableAutoscaler) (not .Values.deployment.disableDeployments) }}
{{- $appResources := .Values.app.resources | default dict }}
{{- $appRequests := get $appResources "requests" | default dict }}
{{- if and (gt (int (.Values.app.keda.targetCPUUtilizationPercentage | default 0)) 0) (not (get $appRequests "cpu")) }}
{{- fail "app.keda.targetCPUUtilizationPercentage requires app.resources.requests.cpu to be set" }}
{{- end }}
{{- if and (gt (int (.Values.app.keda.targetMemoryUtilizationPercentage | default 0)) 0) (not (get $appRequests "memory")) }}
{{- fail "app.keda.targetMemoryUtilizationPercentage requires app.resources.requests.memory to be set" }}
{{- end }}
{{- $appQueueTriggers := list (dict "query" "oneuptime_app_queue_size" "threshold" .Values.app.keda.queueSizeThreshold "port" .Values.app.ports.http) }}
{{- if .Values.worker.enabled }}
{{- if and (le (int (.Values.app.keda.targetCPUUtilizationPercentage | default 0)) 0) (le (int (.Values.app.keda.targetMemoryUtilizationPercentage | default 0)) 0) }}
{{- fail "worker.enabled drops the app's queue-size autoscaling trigger; set app.keda.targetCPUUtilizationPercentage (with app.resources.requests.cpu) and/or app.keda.targetMemoryUtilizationPercentage so the api tier still has an autoscaling trigger." }}
{{- end }}
{{- $appQueueTriggers = list }}
{{- end }}
{{- $metricsConfig := dict "enabled" .Values.app.keda.enabled "minReplicas" .Values.app.keda.minReplicas "maxReplicas" .Values.app.keda.maxReplicas "pollingInterval" .Values.app.keda.pollingInterval "cooldownPeriod" .Values.app.keda.cooldownPeriod "fallback" .Values.app.keda.fallback "targetCPUUtilizationPercentage" .Values.app.keda.targetCPUUtilizationPercentage "targetMemoryUtilizationPercentage" .Values.app.keda.targetMemoryUtilizationPercentage "triggers" $appQueueTriggers }}
{{- $appKedaArgs := dict "ServiceName" "app" "Release" .Release "Values" .Values "MetricsConfig" $metricsConfig "DisableAutoscaler" .Values.app.disableAutoscaler }}
{{- include "oneuptime.kedaScaledObject" $appKedaArgs }}
{{- end }}

{{/* Worker KEDA ScaledObject - scales the dedicated worker on combined queue size
     (worker + workflow + telemetry + runbook) plus optional CPU/memory utilization. KEDA scales
     to the max desired replicas across all triggers. */}}
{{- if and .Values.keda.enabled .Values.worker.enabled .Values.worker.keda.enabled (not .Values.worker.disableAutoscaler) (not .Values.deployment.disableDeployments) }}
{{- $workerResources := .Values.worker.resources | default dict }}
{{- $workerRequests := get $workerResources "requests" | default dict }}
{{- if and (gt (int (.Values.worker.keda.targetCPUUtilizationPercentage | default 0)) 0) (not (get $workerRequests "cpu")) }}
{{- fail "worker.keda.targetCPUUtilizationPercentage requires worker.resources.requests.cpu to be set" }}
{{- end }}
{{- if and (gt (int (.Values.worker.keda.targetMemoryUtilizationPercentage | default 0)) 0) (not (get $workerRequests "memory")) }}
{{- fail "worker.keda.targetMemoryUtilizationPercentage requires worker.resources.requests.memory to be set" }}
{{- end }}
{{- $metricsConfig := dict "enabled" .Values.worker.keda.enabled "minReplicas" .Values.worker.keda.minReplicas "maxReplicas" .Values.worker.keda.maxReplicas "pollingInterval" .Values.worker.keda.pollingInterval "cooldownPeriod" .Values.worker.keda.cooldownPeriod "fallback" .Values.worker.keda.fallback "targetCPUUtilizationPercentage" .Values.worker.keda.targetCPUUtilizationPercentage "targetMemoryUtilizationPercentage" .Values.worker.keda.targetMemoryUtilizationPercentage "triggers" (list (dict "query" "oneuptime_worker_queue_size" "threshold" .Values.worker.keda.queueSizeThreshold "port" .Values.worker.ports.http)) }}
{{- $workerKedaArgs := dict "ServiceName" "worker" "Release" .Release "Values" .Values "MetricsConfig" $metricsConfig "DisableAutoscaler" .Values.worker.disableAutoscaler }}
{{- include "oneuptime.kedaScaledObject" $workerKedaArgs }}
{{- end }}

{{/* AI Agent KEDA ScaledObject */}}
{{- if and .Values.keda.enabled .Values.aiAgent.enabled .Values.aiAgent.keda.enabled (not .Values.aiAgent.disableAutoscaler) (not .Values.deployment.disableDeployments) }}
{{- $metricsConfig := dict "enabled" .Values.aiAgent.keda.enabled "minReplicas" .Values.aiAgent.keda.minReplicas "maxReplicas" .Values.aiAgent.keda.maxReplicas "pollingInterval" .Values.aiAgent.keda.pollingInterval "cooldownPeriod" .Values.aiAgent.keda.cooldownPeriod "fallback" .Values.aiAgent.keda.fallback "triggers" (list (dict "query" "oneuptime_ai_agent_queue_size" "threshold" .Values.aiAgent.keda.queueSizeThreshold "port" .Values.aiAgent.ports.http)) }}
{{- $aiAgentKedaArgs := dict "ServiceName" "ai-agent" "Release" .Release "Values" .Values "MetricsConfig" $metricsConfig "DisableAutoscaler" .Values.aiAgent.disableAutoscaler }}
{{- include "oneuptime.kedaScaledObject" $aiAgentKedaArgs }}
{{- end }}
