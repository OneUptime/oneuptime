{{- if and .Values.clickhouse.enabled (not .Values.clickhouseOperator.altinity.enabled) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-clickhouse-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: clickhouse
    app.kubernetes.io/part-of: clickhouse
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  config.xml: |
    <?xml version="1.0"?>
{{ .Values.clickhouse.configuration | indent 4 }}
  # Profile-level drop-in mounted into users.d (see clickhouse-statefulset.yaml). Batches
  # the background Distributed-insert sender so it keeps up with telemetry volume;
  # otherwise system.distribution_queue backs up and dashboards lag hours behind. Lives in
  # users.d (not the config.d/custom.xml overlay above) because these are profile settings,
  # read from the users config. Mirrors clickhouseOperator.altinity.profiles and the
  # docker-compose Clickhouse/users.d drop-in. No secrets, so it needs no envsubst.
  distributed-insert-tuning.xml: |
    <?xml version="1.0"?>
    <clickhouse>
        <profiles>
            <default>
                <distributed_background_insert_batch>1</distributed_background_insert_batch>
                <distributed_background_insert_split_batch_on_failure>1</distributed_background_insert_split_batch_on_failure>
                <prefer_localhost_replica>1</prefer_localhost_replica>
            </default>
        </profiles>
    </clickhouse>
{{- end }}
