{{- /*
  The node collector. Runs when EITHER pod logs are collected here OR node
  metrics are wanted — the two used to share one logs-only gate, so turning logs
  off silently deleted every kubelet / cAdvisor / host metric too.
  Still named `-logs` for continuity: renaming would orphan the existing
  DaemonSet on upgrade. It has always carried metrics as well as logs.
*/}}
{{- $wantLogs := eq (include "kubernetes-agent.daemonSetLogsEnabled" .) "true" }}
{{- $wantHostMetrics := eq (include "kubernetes-agent.hostMetricsEnabled" .) "true" }}
{{- if eq (include "kubernetes-agent.daemonSetEnabled" .) "true" }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "kubernetes-agent.fullname" . }}-logs
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes-agent.labels" . | nindent 4 }}
    component: log-collector
spec:
  selector:
    matchLabels:
      {{- include "kubernetes-agent.selectorLabels" . | nindent 6 }}
      component: log-collector
  template:
    metadata:
      labels:
        {{- include "kubernetes-agent.selectorLabels" . | nindent 8 }}
        component: log-collector
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-daemonset.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "kubernetes-agent.serviceAccountName" . }}
      {{- if and .Values.debug.enabled .Values.debug.shareProcessNamespace }}
      # Lets the debug sidecar see the collector's processes (ps, /proc, strace).
      shareProcessNamespace: true
      {{- end }}
      tolerations:
        - operator: Exists
      containers:
        - name: otel-collector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config=/etc/otel/otel-collector-config.yaml"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            {{- with .Values.logs.resources.limits.memory }}
            # Go runtime soft memory limit — makes the GC reclaim
            # aggressively as the heap approaches the cgroup limit, so the
            # collector's own memory_limiter (same 80% target) and the kernel
            # OOM killer act as backstops rather than the primary control.
            # Derived from .Values.logs.resources.limits.memory so it tracks
            # the container limit. Only set when a memory limit is configured.
            - name: GOMEMLIMIT
              value: {{ include "kubernetes-agent.gomemlimit" . | quote }}
            {{- end }}
            - name: ONEUPTIME_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubernetes-agent.fullname" . }}
                  key: api-key
          resources:
            {{- toYaml .Values.logs.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/otel
              readOnly: true
            {{- if $wantLogs }}
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            {{- end }}
            {{- if $wantHostMetrics }}
            # /host/proc and /host/sys are what the OTel `hostmetrics`
            # receiver reads from. `root_path: /host` tells it to look
            # under this prefix instead of /proc and /sys (which inside
            # the container are the namespaced view).
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
              mountPropagation: HostToContainer
            - name: host-sys
              mountPath: /host/sys
              readOnly: true
              mountPropagation: HostToContainer
            - name: host-root
              mountPath: /host/
              readOnly: true
              mountPropagation: HostToContainer
            {{- end }}
            {{- if and .Values.auditLogs.enabled (eq (include "kubernetes-agent.hostPathAvailable" .) "true") }}
            # Read-only mount of the kube audit log directory. Default
            # path matches the kubeadm convention.
            - name: audit-logs
              mountPath: /var/log/kubernetes
              readOnly: true
            {{- end }}
        {{- if .Values.debug.enabled }}
        {{- include "kubernetes-agent.debugContainer" . | nindent 8 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "kubernetes-agent.fullname" . }}-daemonset
        {{- if $wantLogs }}
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        {{- end }}
        {{- if $wantHostMetrics }}
        - name: host-proc
          hostPath:
            path: /proc
        - name: host-sys
          hostPath:
            path: /sys
        - name: host-root
          hostPath:
            path: /
        {{- end }}
        {{- if and .Values.auditLogs.enabled (eq (include "kubernetes-agent.hostPathAvailable" .) "true") }}
        - name: audit-logs
          hostPath:
            path: /var/log/kubernetes
            type: DirectoryOrCreate
        {{- end }}
{{- end }}
