apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubernetes-agent.fullname" . }}-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes-agent.labels" . | nindent 4 }}
data:
  otel-collector-config.yaml: |
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"

    receivers:
      {{- if .Values.ebpf.enabled }}
      # Accept OTLP traffic from the eBPF DaemonSet (and any other in-cluster
      # OTLP senders). The eBPF DaemonSet ships its captured HTTP/gRPC/SQL
      # spans here so the collector's k8sattributes processor can enrich them
      # before they're forwarded to OneUptime.
      otlp:
        protocols:
          http:
            endpoint: "0.0.0.0:4318"
          grpc:
            endpoint: "0.0.0.0:4317"
      {{- end }}

      # Collect cluster-level metrics from the Kubernetes API
      k8s_cluster:
        collection_interval: {{ .Values.collectionInterval }}
        node_conditions_to_report:
          - Ready
          - MemoryPressure
          - DiskPressure
          - PIDPressure
          - NetworkUnavailable
        allocatable_types_to_report:
          - cpu
          - memory
          - storage

      # Watch Kubernetes events and ingest as logs
      k8sobjects:
        objects:
          - name: events
            mode: watch
            group: events.k8s.io
          {{- if .Values.resourceSpecs.enabled }}
          # Pull full resource specs for dashboard detail views
          - name: pods
            mode: pull
            interval: {{ .Values.resourceSpecs.interval }}
          - name: nodes
            mode: pull
            interval: {{ .Values.resourceSpecs.interval }}
          - name: namespaces
            mode: pull
            interval: {{ .Values.resourceSpecs.interval }}
          - name: deployments
            mode: pull
            interval: {{ .Values.resourceSpecs.interval }}
            group: apps
          - name: statefulsets
            mode: pull
            interval: {{ .Values.resourceSpecs.interval }}
            group: apps
          - name: daemonsets
            mode: pull
            interval: {{ .Values.resourceSpecs.interval }}
            group: apps
          - name: jobs
            mode: pull
            interval: {{ .Values.resourceSpecs.interval }}
            group: batch
          - name: cronjobs
            mode: pull
            interval: {{ .Values.resourceSpecs.interval }}
            group: batch
          - name: persistentvolumeclaims
            mode: pull
            interval: {{ .Values.resourceSpecs.interval }}
          - name: persistentvolumes
            mode: pull
            interval: {{ .Values.resourceSpecs.interval }}
          - name: horizontalpodautoscalers
            mode: pull
            interval: {{ .Values.resourceSpecs.interval }}
            group: autoscaling
          {{- if .Values.resourceSpecs.vpa }}
          - name: verticalpodautoscalers
            mode: pull
            interval: {{ .Values.resourceSpecs.interval }}
            group: autoscaling.k8s.io
          {{- end }}
          {{- /* nil-safe: values reused from chart <= 0.5.2 (helm upgrade
               --reuse-values) have no resourceSpecs.watch key; an absent key
               defaults to enabled, matching values.yaml. */}}
          {{- if dig "watch" "enabled" true .Values.resourceSpecs }}
          # Watch pods and workload controllers for near-real-time status
          # updates between the pulls above. The pull entries must stay: a
          # watch only emits objects that change, and the server prunes
          # objects unseen for 15 minutes — pull is the full-state resync.
          - name: pods
            mode: watch
          - name: deployments
            mode: watch
            group: apps
          - name: statefulsets
            mode: watch
            group: apps
          - name: daemonsets
            mode: watch
            group: apps
          {{- end }}
          {{- end }}

      {{- if or .Values.controlPlane.enabled .Values.serviceMesh.enabled .Values.csi.enabled .Values.coreDns.enabled .Values.kubeStateMetrics.enabled }}
      # Scrape metrics via Prometheus endpoints (control plane, service
      # mesh, CSI drivers, CoreDNS, kube-state-metrics)
      prometheus:
        config:
          scrape_configs:
            {{- if .Values.controlPlane.enabled }}
            - job_name: etcd
              scheme: https
              metrics_path: /metrics
              tls_config:
                insecure_skip_verify: {{ .Values.controlPlane.etcd.insecureSkipVerify }}
              static_configs:
                {{- range .Values.controlPlane.etcd.endpoints }}
                - targets:
                    # Prometheus targets must be bare host:port — strip any
                    # scheme/path the endpoint was written with (scheme is set
                    # above, metrics_path defaults to /metrics).
                    - {{ . | trimPrefix "https://" | trimPrefix "http://" | trimSuffix "/metrics" | quote }}
                {{- end }}
            - job_name: kube-apiserver
              scheme: https
              metrics_path: /metrics
              tls_config:
                insecure_skip_verify: {{ .Values.controlPlane.apiServer.insecureSkipVerify }}
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              static_configs:
                {{- range .Values.controlPlane.apiServer.endpoints }}
                - targets:
                    # Prometheus targets must be bare host:port — strip any
                    # scheme/path the endpoint was written with (scheme is set
                    # above, metrics_path defaults to /metrics).
                    - {{ . | trimPrefix "https://" | trimPrefix "http://" | trimSuffix "/metrics" | quote }}
                {{- end }}
            - job_name: kube-scheduler
              scheme: https
              metrics_path: /metrics
              tls_config:
                insecure_skip_verify: {{ .Values.controlPlane.scheduler.insecureSkipVerify }}
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              static_configs:
                {{- range .Values.controlPlane.scheduler.endpoints }}
                - targets:
                    # Prometheus targets must be bare host:port — strip any
                    # scheme/path the endpoint was written with (scheme is set
                    # above, metrics_path defaults to /metrics).
                    - {{ . | trimPrefix "https://" | trimPrefix "http://" | trimSuffix "/metrics" | quote }}
                {{- end }}
            - job_name: kube-controller-manager
              scheme: https
              metrics_path: /metrics
              tls_config:
                insecure_skip_verify: {{ .Values.controlPlane.controllerManager.insecureSkipVerify }}
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              static_configs:
                {{- range .Values.controlPlane.controllerManager.endpoints }}
                - targets:
                    # Prometheus targets must be bare host:port — strip any
                    # scheme/path the endpoint was written with (scheme is set
                    # above, metrics_path defaults to /metrics).
                    - {{ . | trimPrefix "https://" | trimPrefix "http://" | trimSuffix "/metrics" | quote }}
                {{- end }}
            {{- end }}
            {{- if and .Values.serviceMesh.enabled (eq .Values.serviceMesh.provider "istio") }}
            - job_name: envoy-stats
              metrics_path: /stats/prometheus
              scrape_interval: {{ .Values.serviceMesh.istio.scrapeInterval }}
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_container_name]
                  action: keep
                  regex: istio-proxy
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
                  action: replace
                  regex: (\d+);((([0-9]+?)(\.|$)){4})
                  replacement: $2:15090
                  target_label: __address__
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  action: replace
                  target_label: pod_name
            {{- end }}
            {{- if and .Values.serviceMesh.enabled (eq .Values.serviceMesh.provider "linkerd") }}
            - job_name: linkerd-proxy
              metrics_path: /metrics
              scrape_interval: {{ .Values.serviceMesh.linkerd.scrapeInterval }}
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_container_name]
                  action: keep
                  regex: linkerd-proxy
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: linkerd-admin
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  action: replace
                  target_label: pod_name
            {{- end }}
            {{- if .Values.csi.enabled }}
            # CSI (storage driver) metrics. Most drivers expose a
            # `metrics` port on the driver pods themselves. Match on
            # the canonical label conventions: `app=csi-driver` or
            # `app.kubernetes.io/component=csi-driver`. If your driver
            # uses a different convention, override this job via the
            # values file.
            - job_name: csi-drivers
              scrape_interval: {{ .Values.csi.scrapeInterval }}
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels:
                    - __meta_kubernetes_pod_label_app
                    - __meta_kubernetes_pod_label_app_kubernetes_io_component
                  action: keep
                  regex: (csi-driver|.*csi-driver.*)
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: (metrics|http-metrics|csi-metrics)
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  action: replace
                  target_label: pod_name
                - source_labels: [__meta_kubernetes_pod_container_name]
                  action: replace
                  target_label: container_name
            {{- end }}
            {{- if .Values.kubeStateMetrics.enabled }}
            # Cluster-state metrics from kube-state-metrics (KSM).
            # `metric_relabel_configs` keeps only the configured
            # allowlist at the receiver — KSM exports ~100 metric
            # families by default, and we only forward the ones that
            # power monitors.
            - job_name: kube-state-metrics
              scrape_interval: {{ .Values.kubeStateMetrics.scrapeInterval }}
              {{- if eq .Values.kubeStateMetrics.mode "external" }}
              # External KSM — operator-provided endpoint.
              static_configs:
                - targets:
                    - {{ .Values.kubeStateMetrics.endpoint | trimPrefix "http://" | trimPrefix "https://" | trimSuffix "/metrics" | quote }}
              {{- else }}
              # Bundled KSM — Service deployed by templates/kube-state-metrics.yaml.
              static_configs:
                - targets:
                    - "{{ include "kubernetes-agent.fullname" . }}-kube-state-metrics.{{ .Release.Namespace }}.svc.cluster.local:8080"
              {{- end }}
              metric_relabel_configs:
                - source_labels: [__name__]
                  regex: "^({{ join "|" .Values.kubeStateMetrics.metricsAllowlist }})$"
                  action: keep
            {{- end }}
            {{- if .Values.coreDns.enabled }}
            # CoreDNS metrics. By default CoreDNS exposes a Prometheus
            # endpoint on port 9153 — exposes query rate, latency, cache
            # hits, error rates. Useful for catching DNS-induced P99
            # latency.
            - job_name: coredns
              scrape_interval: {{ .Values.coreDns.scrapeInterval }}
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - {{ .Values.coreDns.namespace }}
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_k8s_app]
                  action: keep
                  regex: {{ .Values.coreDns.service }}
                - source_labels: [__meta_kubernetes_pod_container_port_number]
                  action: keep
                  regex: "{{ .Values.coreDns.port }}"
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  action: replace
                  target_label: pod_name
            {{- end }}
      {{- end }}

    processors:
      # Enrich all telemetry with Kubernetes metadata
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.daemonset.name
            - k8s.job.name
            - k8s.cronjob.name
            - k8s.container.name
          labels:
            - tag_name: k8s.pod.label.app
              key: app
              from: pod
            - tag_name: k8s.pod.label.app.kubernetes.io/name
              key: app.kubernetes.io/name
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection

      # Stamp telemetry that doesn't already carry these attributes (e.g.
      # k8s_cluster receiver metrics, k8sobjects logs) with the cluster
      # name and a default service.name. Uses `insert` so OBI-emitted
      # metrics — which already carry the real per-pod service.name —
      # aren't overwritten and show up under their own service in the
      # dashboard.
      #
      # Any keys under .Values.oneuptime.labels are also stamped here as
      # `oneuptime.label.<key>=<value>` resource attributes. The OneUptime
      # ingest pipeline promotes those into project Labels.
      resource:
        attributes:
          - key: k8s.cluster.name
            value: {{ .Values.clusterName | quote }}
            action: insert
          - key: service.name
            value: "kubernetes-agent-{{ .Values.clusterName }}"
            action: insert
          - key: oneuptime.agent.version
            value: {{ .Chart.AppVersion | quote }}
            action: insert
          {{- include "kubernetes-agent.oneuptimeLabels" (dict "labels" .Values.oneuptime.labels "action" "insert") | nindent 10 }}

      # The k8sobjects receiver emits LogRecords without a severity, so
      # Kubernetes events and resource snapshots arrive at OneUptime with
      # severity_number=0 and render as "Unspecified" on the Logs page.
      # Default to INFO and upgrade Warning-type events to WARN so severity
      # filters work out of the box.
      transform/severity:
        error_mode: ignore
        log_statements:
          - context: log
            statements:
              - set(severity_text, "INFO") where severity_text == ""
              - set(severity_number, SEVERITY_NUMBER_INFO) where severity_number == 0
              - set(severity_text, "WARN") where IsMap(body) and body["type"] == "Warning"
              - set(severity_number, SEVERITY_NUMBER_WARN) where IsMap(body) and body["type"] == "Warning"
              - set(severity_text, "WARN") where IsString(body) and IsMatch(body, "\"type\"\\s*:\\s*\"Warning\"")
              - set(severity_number, SEVERITY_NUMBER_WARN) where IsString(body) and IsMatch(body, "\"type\"\\s*:\\s*\"Warning\"")

      # Batch telemetry for efficient export
      batch:
        send_batch_size: 100
        send_batch_max_size: 200
        timeout: 10s

      # Memory ceiling for the collector. limit_mib / spike_limit_mib are
      # derived from the container memory limit
      # (.Values.deployment.resources.limits.memory, wired into the Deployment
      # at templates/deployment.yaml) so the limiter always trips *below* the
      # cgroup limit and can't drift above it. limit_mib ≈ 80% of the
      # container limit, spike_limit_mib ≈ 20% of limit_mib (OTel guidance).
      # See the `kubernetes-agent.memoryLimiter` helper.
      memory_limiter:
        {{- include "kubernetes-agent.memoryLimiter" (.Values.deployment.resources.limits.memory | default "4Gi") | nindent 8 }}

    exporters:
      otlphttp:
        endpoint: "{{ .Values.oneuptime.url }}/otlp"
        encoding: json
        headers:
          x-oneuptime-token: "${env:ONEUPTIME_API_KEY}"
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 60s
          max_elapsed_time: 300s

    service:
      extensions:
        - health_check
      pipelines:
        metrics:
          receivers:
            - k8s_cluster
            {{- if .Values.ebpf.enabled }}
            # OBI emits application/network/stats metrics on the same OTLP
            # receiver that handles its traces — pull them into the same
            # metrics pipeline so they ride the existing batch/retry/auth
            # path to OneUptime.
            - otlp
            {{- end }}
            {{- if or .Values.controlPlane.enabled .Values.serviceMesh.enabled .Values.csi.enabled .Values.coreDns.enabled .Values.kubeStateMetrics.enabled }}
            - prometheus
            {{- end }}
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - batch
          exporters:
            - otlphttp
        logs:
          receivers:
            - k8sobjects
          processors:
            - memory_limiter
            - k8sattributes
            - resource
            - transform/severity
            - batch
          exporters:
            - otlphttp
        {{- if .Values.ebpf.enabled }}
        # Traces pipeline: accept OTLP spans from the eBPF DaemonSet, enrich
        # with k8s attributes, stamp cluster name, and forward to OneUptime.
        # We deliberately omit the `resource` processor's service.name
        # override here — OBI sets a per-process service.name from k8s
        # workload metadata, and we want to preserve it so each app shows up
        # under its own service in the dashboard.
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - k8sattributes
            - batch
          exporters:
            - otlphttp
        {{- end }}
