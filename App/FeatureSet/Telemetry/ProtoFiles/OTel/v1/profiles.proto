syntax = "proto3";

package opentelemetry.proto.profiles.v1development;

import "./common.proto";
import "./resource.proto";

option csharp_namespace = "OpenTelemetry.Proto.Profiles.V1Development";
option java_multiple_files = true;
option java_package = "io.opentelemetry.proto.profiles.v1development";
option java_outer_classname = "ProfilesProto";
option go_package = "go.opentelemetry.io/proto/otlp/profiles/v1development";

// ProfilesDictionary holds tables shared by every Profile in a request.
// Items are referenced from Profile / Sample / Location / Mapping by their
// index in these arrays. By spec the first entry in every table is a
// zero-value sentinel, so an index of 0 means "unset".
message ProfilesDictionary {
  repeated Mapping mapping_table = 1;
  repeated Location location_table = 2;
  repeated Function function_table = 3;
  repeated Link link_table = 4;
  repeated string string_table = 5;
  repeated KeyValueAndUnit attribute_table = 6;
  repeated Stack stack_table = 7;
}

// ProfilesData wraps a list of ResourceProfiles plus the shared dictionary
// referenced by every Profile in the message.
message ProfilesData {
  repeated ResourceProfiles resource_profiles = 1;
  ProfilesDictionary dictionary = 2;
}

// A collection of ScopeProfiles from a Resource.
message ResourceProfiles {
  reserved 1000;

  opentelemetry.proto.resource.v1.Resource resource = 1;
  repeated ScopeProfiles scope_profiles = 2;
  string schema_url = 3;
}

// A collection of Profiles produced by an InstrumentationScope.
message ScopeProfiles {
  opentelemetry.proto.common.v1.InstrumentationScope scope = 1;
  repeated Profile profiles = 2;
  string schema_url = 3;
}

// Profile is a single profile collection. v1development moved the
// per-profile tables (string/function/location/...) into ProfilesDictionary,
// flipped sample_type to singular, renamed `sample` -> `samples`, and
// replaced container start/end times with time_unix_nano + duration_nano.
message Profile {
  ValueType sample_type = 1;
  repeated Sample samples = 2;

  fixed64 time_unix_nano = 3;
  uint64 duration_nano = 4;
  ValueType period_type = 5;
  int64 period = 6;

  bytes profile_id = 7;
  uint32 dropped_attributes_count = 8;
  string original_payload_format = 9;
  bytes original_payload = 10;
  repeated int32 attribute_indices = 11;
}

// A pointer from a profile Sample to a trace Span.
message Link {
  bytes trace_id = 1;
  bytes span_id = 2;
}

// ValueType describes the type and unit of a value. Both fields index into
// ProfilesDictionary.string_table.
message ValueType {
  int32 type_strindex = 1;
  int32 unit_strindex = 2;
}

// Each Sample records values encountered in some program context.
message Sample {
  int32 stack_index = 1;
  repeated int32 attribute_indices = 2;
  int32 link_index = 3;
  repeated int64 values = 4;
  repeated fixed64 timestamps_unix_nano = 5;
}

// Describes the mapping of a binary in memory.
message Mapping {
  uint64 memory_start = 1;
  uint64 memory_limit = 2;
  uint64 file_offset = 3;
  int32 filename_strindex = 4;
  repeated int32 attribute_indices = 5;
}

// A Stack is an ordered list of location indices, leaf first.
message Stack {
  repeated int32 location_indices = 1;
}

// Describes function and line information for an address.
message Location {
  int32 mapping_index = 1;
  uint64 address = 2;
  repeated Line lines = 3;
  repeated int32 attribute_indices = 4;
}

// Details a specific line in source code, linked to a function.
message Line {
  int32 function_index = 1;
  int64 line = 2;
  int64 column = 3;
}

// Describes a function. All *_strindex fields index into
// ProfilesDictionary.string_table.
message Function {
  int32 name_strindex = 1;
  int32 system_name_strindex = 2;
  int32 filename_strindex = 3;
  int64 start_line = 4;
}

// A dictionary-native attribute entry with an optional unit. The key and
// unit are interned into ProfilesDictionary.string_table.
message KeyValueAndUnit {
  int32 key_strindex = 1;
  opentelemetry.proto.common.v1.AnyValue value = 2;
  int32 unit_strindex = 3;
}
