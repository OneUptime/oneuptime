receivers:
  docker_stats:
    endpoint: unix:///run/podman/podman.sock
    # Pin to a modern Docker Engine API version. The receiver default is
    # "1.25" which modern daemons reject ("client version too old").
    # Podman exposes a Docker-API compatible socket, so the docker_stats
    # receiver works unchanged against it (there is no podman_stats
    # receiver in otel-contrib).
    api_version: "1.44"
    collection_interval: 30s
    # Enable optional metrics that the OneUptime Podman monitor alert
    # templates depend on (container restarts, uptime, pid count,
    # CPU throttling). These are OFF by default in the contrib
    # docker_stats receiver and must be explicitly turned on.
    metrics:
      container.cpu.utilization:
        enabled: true
      container.cpu.throttling_data.throttled_periods:
        enabled: true
      container.cpu.throttling_data.throttled_time:
        enabled: true
      container.memory.percent:
        enabled: true
      container.pids.count:
        enabled: true
      container.restarts:
        enabled: true
      container.uptime:
        enabled: true

  filelog:
    # Podman's default log driver is journald (rootful) or k8s-file
    # (rootless / `--log-driver k8s-file`), NOT Docker's json-file. The
    # k8s-file driver writes CRI-formatted lines to ctr.log under the
    # container's storage dir. Point the receiver at that location.
    # Operators must run their target containers with `--log-driver
    # k8s-file` (or json-file) for these logs to exist — see the
    # "Log Driver Requirement" section of the README.
    include:
      - /var/lib/containers/storage/overlay-containers/*/userdata/ctr.log
    # Exclude the agent's own container log to avoid a feedback loop where
    # the collector ingests and exports its own scrape/export stack traces.
    # Inside a container, HOSTNAME defaults to the short (12-char)
    # container ID, and Podman stores each container's log under a directory
    # named by the full container ID, so a prefix glob excludes this
    # container's log file on start-up.
    exclude:
      - /var/lib/containers/storage/overlay-containers/${env:HOSTNAME}*/userdata/ctr.log
    start_at: end
    include_file_path: true
    include_file_name: false
    operators:
      # Parse Podman's k8s-file (CRI) log line format:
      #   <RFC3339Nano timestamp> <stream> <P|F> <message>
      # e.g. 2024-01-01T00:00:00.000000000Z stdout F hello world
      # P = partial (no trailing newline yet), F = full line.
      - type: regex_parser
        id: parser-podman
        regex: '^(?P<time>[^ ]+) (?P<stream>stdout|stderr) (?P<logtag>[PF]) ?(?P<log>.*)$'
        timestamp:
          parse_from: attributes.time
          layout: "%Y-%m-%dT%H:%M:%S.%LZ"
      # Extract the container ID from the file path so we can display
      # it on the Logs page and correlate with docker_stats metrics.
      - type: regex_parser
        id: extract-container-id
        regex: "^/var/lib/containers/storage/overlay-containers/(?P<container_id>[^/]+)/.+$"
        parse_from: attributes["log.file.path"]
      - type: move
        from: attributes.container_id
        to: resource["container.id"]
      - type: move
        from: attributes.log
        to: body
      - type: move
        from: attributes.stream
        to: attributes["log.iostream"]
      # The k8s-file driver splits long lines into multiple partial (P)
      # records, and a multi-line stack trace (e.g. a Node.js error with
      # "    at ..." frames) arrives as many separate log records.
      # Recombine consecutive entries from the same container log file
      # into a single record so exceptions show up as one log line in the
      # OneUptime UI. We treat any line that begins with whitespace or a
      # closing bracket/brace/paren as a continuation of the previous
      # entry, which covers stack frames, pretty-printed JSON, and
      # multi-line error details. source_identifier keeps records from
      # different containers from being merged together.
      - type: recombine
        id: recombine-multiline
        combine_field: body
        combine_with: "\n"
        is_first_entry: 'body matches "^[^\\s\\}\\)\\]]"'
        source_identifier: attributes["log.file.path"]
        force_flush_period: 5s
        max_log_size: 1048576
      # Podman's log driver does not record a severity; OTel log records
      # have dedicated severity_number / severity_text fields that downstream
      # viewers rely on for filtering. Derive a best-effort severity from the
      # stdout/stderr stream: stderr -> ERROR, stdout -> INFO.
      - type: add
        id: add-severity-text
        field: attributes.severity_text
        value: 'EXPR(attributes["log.iostream"] == "stderr" ? "ERROR" : "INFO")'
      # Promote the textual severity onto the LogRecord itself so OTel log
      # consumers see a real severity_number (17 for ERROR, 9 for INFO) rather
      # than Unspecified.
      - type: severity_parser
        id: severity-parser
        parse_from: attributes.severity_text
        mapping:
          error: ERROR
          info: INFO
      # Remove the now-redundant attribute so we don't duplicate the value
      # both as an attribute and as the record's severity field.
      - type: remove
        id: remove-severity-attr
        field: attributes.severity_text

  # Inventory snapshots produced by inventory-snapshot.sh. Each line
  # in the file is a JSON envelope:
  #   {"oneuptime.podman.kind":"Container","data":{...}}
  # The json_parser promotes both fields to attributes, then we move
  # `data` into the body and surface the kind on a dedicated log
  # record attribute the OneUptime backend reads.
  filelog/inventory:
    include:
      - /var/log/oneuptime-podman-inventory.log
    start_at: beginning
    include_file_path: false
    include_file_name: false
    # The poller atomically rewrites the file on each interval, so we
    # need to re-read from the top each time it changes.
    poll_interval: 30s
    operators:
      - type: json_parser
        id: parser-inventory
      - type: move
        from: attributes.data
        to: body
      - type: move
        from: 'attributes["oneuptime.podman.kind"]'
        to: 'attributes["oneuptime.podman.kind"]'

processors:
  resource:
    attributes:
      - key: container.runtime
        value: "podman"
        action: upsert
      - key: host.name
        value: "${env:PODMAN_HOST_NAME}"
        action: upsert
      - key: oneuptime.agent.version
        value: "${env:APP_VERSION}"
        action: upsert
  resourcedetection:
    detectors: [env, system]
    system:
      hostname_sources: [os]
    override: false
  batch:
    timeout: 10s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128
  # Drop noisy collector self-logs that slip through the filelog exclude
  # (e.g. if PODMAN_AGENT_CONTAINER_ID is not set). Matches on the
  # OTel Collector's characteristic error strings. The docker_stats
  # receiver still emits under the "dockerstatsreceiver" name even when
  # scraping Podman, so that token is kept here.
  filter/drop_self_logs:
    error_mode: ignore
    logs:
      log_record:
        - 'IsMatch(body, ".*(otelcol|exporterhelper|scraperhelper|opentelemetry\\.io/collector|opentelemetry-collector-contrib|dockerstatsreceiver|Error scraping metrics).*")'

exporters:
  otlphttp:
    endpoint: "${env:ONEUPTIME_URL}/otlp"
    headers:
      x-oneuptime-service-token: "${env:ONEUPTIME_SERVICE_TOKEN}"

service:
  pipelines:
    metrics:
      receivers: [docker_stats]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [otlphttp]
    logs:
      receivers: [filelog]
      processors:
        [memory_limiter, filter/drop_self_logs, resourcedetection, resource, batch]
      exporters: [otlphttp]
    # Inventory snapshots travel on a separate logs pipeline so the
    # drop-self-logs filter (which is body-match against runtime
    # noise) cannot accidentally swallow them.
    logs/inventory:
      receivers: [filelog/inventory]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [otlphttp]
